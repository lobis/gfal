name: CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
  schedule:
    - cron: '30 0 * * *'  # 00:30 UTC daily
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # 1. Tests & Linting
  # ---------------------------------------------------------------------------

  codespell:
    name: Codespell spell-check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: codespell-project/actions-codespell@v2
      with:
        ignore_words_list: cern,xrootd,fsspec,gfal,adler,aiohttp,thirdparty,scitag

  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir pre-commit
    - name: Run pre-commit
      run: pre-commit run --all-files

  tests:
    name: Tests (${{ matrix.os }}, Py ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: [ "3.9", "3.10", "3.11", "3.12", "3.13", "3.14" ]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install system build dependencies (xrootd needs libuuid on Linux)
      if: matrix.os == 'ubuntu-latest' && (github.event_name == 'schedule' || matrix.python-version == '3.12')
      run: sudo apt-get update && sudo apt-get install -y uuid-dev
    - name: Install package and test dependencies
      run: pip install --no-cache-dir "${{ (github.event_name == 'schedule' || matrix.python-version == '3.12') && matrix.os != 'windows-latest' && '.[dev,all]' || '.[dev]' }}"
    - name: Run unit and functional tests
      run: pytest tests/ -v -m "not integration and not xrootd" --cov=gfal --cov-report=xml
    - name: Upload coverage
      if: ${{ !env.ACT }}
      continue-on-error: true
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        flags: unittests
        fail_ci_if_error: false

  xrootd:
    name: XRootD Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install XRootD system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y uuid-dev xrootd-server
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir ".[dev,xrootd]"
    - name: Run XRootD tests
      run: pytest tests/ -v -m xrootd

  integration:
    name: Integration Tests (EOS)
    runs-on: ubuntu-latest
    env:
      PYTHON3_GFAL_SERVICE_ACCOUNT_P12: ${{ secrets.PYTHON3_GFAL_SERVICE_ACCOUNT_P12 }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir ".[dev,all]"
        sudo apt-get update
        sudo apt-get install -y globus-proxy-utils
    - name: Build Docker integration image
      run: docker build --platform linux/amd64 -t xrootd-cern-test -f docker/Dockerfile.xrootd-cern-test .
    - name: Set up EOS service account credentials
      if: env.PYTHON3_GFAL_SERVICE_ACCOUNT_P12 != ''
      run: |
        CERT_TMPDIR=$(mktemp -d)
        export CERT_TMPDIR
        trap 'rm -rf "$CERT_TMPDIR" /tmp/usercert.pem /tmp/userkey.pem' EXIT
        echo "$PYTHON3_GFAL_SERVICE_ACCOUNT_P12" | base64 -d > "$CERT_TMPDIR/service_account.p12"
        openssl pkcs12 -in "$CERT_TMPDIR/service_account.p12" -clcerts -nokeys -passin pass: -out "$CERT_TMPDIR/usercert.pem"
        openssl pkcs12 -in "$CERT_TMPDIR/service_account.p12" -nocerts -nodes -passin pass: -out "$CERT_TMPDIR/userkey.pem"
        cp "$CERT_TMPDIR/usercert.pem" /tmp/usercert.pem
        cp "$CERT_TMPDIR/userkey.pem" /tmp/userkey.pem
        chown "$(id -u):$(id -g)" /tmp/usercert.pem /tmp/userkey.pem
        chmod 600 /tmp/usercert.pem /tmp/userkey.pem
        ls -ln /tmp/usercert.pem /tmp/userkey.pem
        CERT_EXPIRY=$(openssl x509 -in /tmp/usercert.pem -noout -enddate | cut -d= -f2)
        echo "Service account certificate expires: ${CERT_EXPIRY}"
        if openssl x509 -in /tmp/usercert.pem -noout -checkend 2592000 > /dev/null 2>&1; then
          echo "Certificate is valid for at least 30 days."
        else
          echo "::warning::Service account certificate expires within 30 days (${CERT_EXPIRY})! Renew it at https://ca.cern.ch/ca/"
        fi
        grid-proxy-init -cert /tmp/usercert.pem -key /tmp/userkey.pem -out /tmp/x509proxy -valid 12:00 -q
        PROXY_EXPIRY=$(openssl x509 -in /tmp/x509proxy -noout -enddate | cut -d= -f2)
        echo "X.509 proxy generated, expires: ${PROXY_EXPIRY}"
        echo "X509_USER_PROXY=/tmp/x509proxy" >> "$GITHUB_ENV"
    - name: Run integration tests
      run: |
        timeout 30m pytest -v -rs \
          --reruns 3 --reruns-delay 10 \
          tests/test_integration_eospublic.py \
          tests/test_integration_eospilot.py

  integration-compare-gfal2:
    name: Integration Compare Tests (Alma Docker)
    runs-on: ubuntu-latest
    env:
      PYTHON3_GFAL_SERVICE_ACCOUNT_P12: ${{ secrets.PYTHON3_GFAL_SERVICE_ACCOUNT_P12 }}
    # This job is informative on PRs but should not block unrelated changes.
    # It exercises an Alma + legacy gfal2 comparison stack that is known to be flaky
    # due to old upstream bindings/runtime issues outside this repo.
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install local test dependencies
      run: pip install --no-cache-dir ".[dev]"
    - name: Install host proxy tooling
      run: |
        sudo apt-get update
        sudo apt-get install -y globus-proxy-utils
    - name: Build Alma Docker comparison image
      run: docker build --platform linux/amd64 -t xrootd-cern-test -f docker/Dockerfile.xrootd-cern-test .
    - name: Set up EOS service account credentials
      if: env.PYTHON3_GFAL_SERVICE_ACCOUNT_P12 != ''
      run: |
        CERT_TMPDIR=$(mktemp -d)
        export CERT_TMPDIR
        trap 'rm -rf "$CERT_TMPDIR" /tmp/usercert.pem /tmp/userkey.pem' EXIT
        echo "$PYTHON3_GFAL_SERVICE_ACCOUNT_P12" | base64 -d > "$CERT_TMPDIR/service_account.p12"
        openssl pkcs12 -in "$CERT_TMPDIR/service_account.p12" -clcerts -nokeys -passin pass: -out /tmp/usercert.pem
        openssl pkcs12 -in "$CERT_TMPDIR/service_account.p12" -nocerts -nodes -passin pass: -out /tmp/userkey.pem
        chown "$(id -u):$(id -g)" /tmp/usercert.pem /tmp/userkey.pem
        chmod 600 /tmp/usercert.pem /tmp/userkey.pem
        ls -ln /tmp/usercert.pem /tmp/userkey.pem
        grid-proxy-init -cert /tmp/usercert.pem -key /tmp/userkey.pem -out /tmp/gfal-tmp-proxy -valid 12:00 -q
        ls -ln /tmp/gfal-tmp-proxy
        echo "X509_USER_PROXY=/tmp/gfal-tmp-proxy" >> "$GITHUB_ENV"
    - name: Run gfal vs gfal2 comparison tests
      if: env.PYTHON3_GFAL_SERVICE_ACCOUNT_P12 != ''
      run: pytest tests/test_integration_compare_gfal2.py -v --tb=short

  deployment-integration:
    name: Deployment Integration (EOS kind)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      EOS_IMAGE_REPO: gitlab-registry.cern.ch/dss/eos/eos-ci
      EOS_IMAGE_TAG: 5.4.1.el9
      PYTHON3_GFAL_SERVICE_ACCOUNT_P12: ${{ secrets.PYTHON3_GFAL_SERVICE_ACCOUNT_P12 }}
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install local test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir ".[dev,all]"
        sudo apt-get update
        sudo apt-get install -y globus-proxy-utils

    - name: Set up EOS service account credentials
      if: env.PYTHON3_GFAL_SERVICE_ACCOUNT_P12 != ''
      run: |
        CERT_TMPDIR=$(mktemp -d)
        export CERT_TMPDIR
        trap 'rm -rf "$CERT_TMPDIR" /tmp/usercert.pem /tmp/userkey.pem' EXIT
        echo "$PYTHON3_GFAL_SERVICE_ACCOUNT_P12" | base64 -d > "$CERT_TMPDIR/service_account.p12"
        openssl pkcs12 -in "$CERT_TMPDIR/service_account.p12" -clcerts -nokeys -passin pass: -out /tmp/usercert.pem
        openssl pkcs12 -in "$CERT_TMPDIR/service_account.p12" -nocerts -nodes -passin pass: -out /tmp/userkey.pem
        chown "$(id -u):$(id -g)" /tmp/usercert.pem /tmp/userkey.pem
        chmod 600 /tmp/usercert.pem /tmp/userkey.pem
        grid-proxy-init -cert /tmp/usercert.pem -key /tmp/userkey.pem -out /tmp/x509proxy -valid 12:00 -q
        echo "X509_USER_PROXY=/tmp/x509proxy" >> "$GITHUB_ENV"

    - name: Free disk space
      run: |
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet \
          /opt/ghc /usr/local/share/boost /usr/share/swift \
          /opt/hostedtoolcache/CodeQL || true
        docker system prune -af --volumes || true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build deployment test runner image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: docker/Dockerfile.integration-runner
        load: true
        platforms: linux/amd64
        tags: gfal-integration-runner:latest
        cache-from: type=gha,scope=deployment-integration-runner
        cache-to: type=gha,mode=max,scope=deployment-integration-runner

    - name: Set EOS cache key
      id: eos-version
      run: echo "tag=${EOS_IMAGE_TAG}" >> "$GITHUB_OUTPUT"

    - name: Cache EOS Docker image
      id: cache-eos-image
      uses: actions/cache@v5
      with:
        path: /tmp/eos-image.tar
        key: eos-kind-image-${{ steps.eos-version.outputs.tag }}

    - name: Pull and save EOS Docker image
      if: steps.cache-eos-image.outputs.cache-hit != 'true'
      run: |
        docker pull "${EOS_IMAGE_REPO}:${EOS_IMAGE_TAG}"
        docker save "${EOS_IMAGE_REPO}:${EOS_IMAGE_TAG}" -o /tmp/eos-image.tar

    - name: Load EOS Docker image from cache
      if: steps.cache-eos-image.outputs.cache-hit == 'true'
      run: |
        docker load -i /tmp/eos-image.tar
        rm -f /tmp/eos-image.tar

    - name: Create kind cluster
      uses: helm/kind-action@v1

    - name: Load EOS image into kind
      run: |
        kind load docker-image \
          --name chart-testing \
          "${EOS_IMAGE_REPO}:${EOS_IMAGE_TAG}"
        docker rmi "${EOS_IMAGE_REPO}:${EOS_IMAGE_TAG}" || true

    - name: Load test runner image into kind
      run: kind load docker-image --name chart-testing gfal-integration-runner:latest

    - name: Deploy EOS via Helm chart
      run: |
        helm install eos oci://registry.cern.ch/eos/charts/server \
          --set "global.repository=${EOS_IMAGE_REPO}" \
          --set "global.tag=${EOS_IMAGE_TAG}" \
          --set "global.pullPolicy=IfNotPresent" \
          --set "fst.replicaCount=2" \
          --set "qdb.replicaCount=1" \
          --set "global.securityContext.privileged=true" \
          --set "global.securityContext.allowPrivilegeEscalation=true" \
          --timeout 20m \
          --wait

    - name: Wait for EOS namespace to boot
      run: |
        MGM_CONTAINER=$(kubectl get pod eos-mgm-0 -o jsonpath='{.spec.containers[0].name}')
        for i in $(seq 1 60); do
          if kubectl exec eos-mgm-0 -c "${MGM_CONTAINER}" -- eos ns stat 2>/dev/null | grep -q "booted"; then
            break
          fi
          if [ "$i" -eq 60 ]; then
            kubectl logs eos-mgm-0 --all-containers=true --tail=100 || true
            exit 1
          fi
          sleep 10
        done

    - name: Create EOS proxy secret
      if: env.X509_USER_PROXY != ''
      run: |
        kubectl create secret generic eos-proxy \
          --from-file=x509proxy="${X509_USER_PROXY}" \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Prepare EOS deployment contract
      env:
        EOS_TEST_KUBECTL_TARGET: eos-mgm-0
        EOS_TEST_KUBECTL_NAMESPACE: default
      run: |
        chmod +x scripts/prepare-eos-kind-deployment.sh
        export EOS_TEST_KUBECTL_CONTAINER
        EOS_TEST_KUBECTL_CONTAINER=$(kubectl get pod eos-mgm-0 -o jsonpath='{.spec.containers[0].name}')
        ./scripts/prepare-eos-kind-deployment.sh "gha-${GITHUB_RUN_ID}" >> "$GITHUB_ENV"

    - name: Run generic deployment integration tests inside kind
      run: |
        kubectl delete job gfal-eos-tests --ignore-not-found=true
        cat <<EOF | kubectl apply -f -
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: gfal-eos-tests
        spec:
          backoffLimit: 0
          template:
            spec:
              restartPolicy: Never
              volumes:
              - name: x509proxy
                secret:
                  secretName: eos-proxy
                  optional: true
              containers:
              - name: tests
                image: gfal-integration-runner:latest
                imagePullPolicy: Never
                env:
                - name: GFAL_DEPLOYMENT_NAME
                  value: "${GFAL_DEPLOYMENT_NAME}"
                - name: GFAL_DEPLOYMENT_VERIFY_SSL
                  value: "${GFAL_DEPLOYMENT_VERIFY_SSL}"
                - name: GFAL_DEPLOYMENT_SUPPORTS_LISTING
                  value: "${GFAL_DEPLOYMENT_SUPPORTS_LISTING}"
                - name: GFAL_DEPLOYMENT_HTTP_WRITABLE_BASE
                  value: "${GFAL_DEPLOYMENT_HTTP_WRITABLE_BASE}"
                - name: GFAL_DEPLOYMENT_HTTP_DENIED_BASE
                  value: "${GFAL_DEPLOYMENT_HTTP_DENIED_BASE}"
                - name: GFAL_DEPLOYMENT_ROOT_WRITABLE_BASE
                  value: "${GFAL_DEPLOYMENT_ROOT_WRITABLE_BASE}"
                - name: GFAL_DEPLOYMENT_ROOT_DENIED_BASE
                  value: "${GFAL_DEPLOYMENT_ROOT_DENIED_BASE}"
                - name: GFAL_DEPLOYMENT_PROXY
                  value: "/tmp/x509proxy"
                - name: X509_USER_PROXY
                  value: "/tmp/x509proxy"
                volumeMounts:
                - name: x509proxy
                  mountPath: /tmp/x509proxy
                  subPath: x509proxy
                  readOnly: true
        EOF

        (
          for _ in $(seq 1 240); do
            POD=$(kubectl get pod -l job-name=gfal-eos-tests -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            if [ -n "${POD}" ]; then
              echo "Streaming logs from ${POD}"
              kubectl logs -f "${POD}" --all-containers=true || true
              exit 0
            fi
            sleep 5
          done
        ) &
        LOG_PID=$!

        wait_for_job() {
          local job_name=$1
          local deadline=$(( $(date +%s) + 1200 ))
          while [ "$(date +%s)" -lt "${deadline}" ]; do
            succeeded=$(kubectl get job "${job_name}" -o jsonpath='{.status.succeeded}' 2>/dev/null || echo "")
            failed=$(kubectl get job "${job_name}" -o jsonpath='{.status.failed}' 2>/dev/null || echo "")
            if [ -n "${succeeded}" ] && [ "${succeeded}" -ge 1 ]; then
              return 0
            fi
            if [ -n "${failed}" ] && [ "${failed}" -ge 1 ]; then
              echo "Job ${job_name} failed"
              return 1
            fi
            sleep 5
          done
          echo "Timed out waiting for job ${job_name} to finish"
          return 124
        }

        if ! wait_for_job gfal-eos-tests; then
          kill "${LOG_PID}" || true
          kubectl logs job/gfal-eos-tests --all-containers=true --tail=-1 || true
          kubectl describe job gfal-eos-tests || true
          kubectl get pods || true
          kubectl describe pod -l job-name=gfal-eos-tests || true
          exit 1
        fi

        kill "${LOG_PID}" || true
        kubectl logs job/gfal-eos-tests --all-containers=true --tail=-1

    - name: Dump EOS state on failure
      if: failure()
      run: |
        kubectl get pods || true
        kubectl get svc || true
        kubectl logs eos-mgm-0 --all-containers=true --tail=100 || true

  deployment-integration-dcache:
    name: Deployment Integration (dCache kind)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v6

    - name: Free disk space
      run: |
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet \
          /opt/ghc /usr/local/share/boost /usr/share/swift \
          /opt/hostedtoolcache/CodeQL || true
        docker system prune -af --volumes || true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build deployment test runner image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: docker/Dockerfile.integration-runner
        load: true
        platforms: linux/amd64
        tags: gfal-integration-runner:latest
        cache-from: type=gha,scope=deployment-integration-runner
        cache-to: type=gha,mode=max,scope=deployment-integration-runner

    - name: Create kind cluster
      uses: helm/kind-action@v1

    - name: Load test runner image into kind
      run: kind load docker-image --name chart-testing gfal-integration-runner:latest

    - name: Start dCache progress logger
      run: |
        cat > /tmp/k8s-progress.sh <<'SH'
        set -eu
        tick=0
        while true; do
          tick=$((tick + 1))
          echo "=== $(date -u +'%Y-%m-%dT%H:%M:%SZ') dCache snapshot ${tick} ==="
          kubectl get pods -A -o wide || true
          kubectl get jobs -A || true
          if [ $((tick % 3)) -eq 0 ]; then
            kubectl get events -A --sort-by=.metadata.creationTimestamp | tail -n 30 || true
          fi
          sleep 20
        done
        SH
        bash /tmp/k8s-progress.sh &
        echo $! > /tmp/k8s-progress.pid

    - name: Add Helm repositories
      run: |
        helm repo add bitnami https://charts.bitnami.com/bitnami
        helm repo add dcache https://gitlab.desy.de/api/v4/projects/7648/packages/helm/test
        helm repo update

    - name: Deploy dCache dependencies
      run: |
        helm install --wait \
          --set auth.username=dcache \
          --set auth.password=let-me-in \
          --set auth.database=chimera \
          chimera bitnami/postgresql
        # These chart defaults still point at archived Bitnami tags that no longer
        # exist on Docker Hub. Use the matching bitnamilegacy images instead.
        helm install --wait \
          --set global.security.allowInsecureImages=true \
          --set image.repository=bitnamilegacy/zookeeper \
          cells bitnami/zookeeper
        helm install --wait \
          --set global.security.allowInsecureImages=true \
          --set externalZookeeper.servers=cells-zookeeper \
          --set kraft.enabled=false \
          --set image.repository=bitnamilegacy/kafka \
          billing bitnami/kafka \
          --version 23.0.7

    - name: Deploy dCache via Helm chart
      run: helm install --wait -f ci/dcache-values.yaml store dcache/dcache

    - name: Wait for dCache WebDAV door to accept connections
      run: |
        echo "Waiting for dCache WebDAV door on port 8083..."
        for i in $(seq 1 60); do
          if kubectl exec store-dcache-door-0 -- \
               bash -c 'echo > /dev/tcp/localhost/8083' 2>/dev/null; then
            echo "dCache WebDAV door is ready (attempt ${i})"
            break
          fi
          if [ "${i}" -eq 60 ]; then
            echo "dCache WebDAV door did not become ready after 10 minutes"
            kubectl logs statefulset/store-dcache-door --all-containers=true --tail=100 || true
            exit 1
          fi
          sleep 10
        done

    - name: Prepare dCache deployment contract
      run: |
        chmod +x scripts/prepare-dcache-kind-deployment.sh
        ./scripts/prepare-dcache-kind-deployment.sh "gha-${GITHUB_RUN_ID}" store default >> "$GITHUB_ENV"

    - name: Run generic deployment integration tests inside kind
      run: |
        kubectl delete job gfal-dcache-tests --ignore-not-found=true
        cat <<EOF | kubectl apply -f -
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: gfal-dcache-tests
        spec:
          backoffLimit: 0
          template:
            spec:
              restartPolicy: Never
              containers:
              - name: tests
                image: gfal-integration-runner:latest
                imagePullPolicy: Never
                env:
                - name: GFAL_DEPLOYMENT_NAME
                  value: "${GFAL_DEPLOYMENT_NAME}"
                - name: GFAL_DEPLOYMENT_VERIFY_SSL
                  value: "${GFAL_DEPLOYMENT_VERIFY_SSL}"
                - name: GFAL_DEPLOYMENT_SUPPORTS_LISTING
                  value: "${GFAL_DEPLOYMENT_SUPPORTS_LISTING}"
                - name: GFAL_DEPLOYMENT_HTTP_WRITABLE_BASE
                  value: "${GFAL_DEPLOYMENT_HTTP_WRITABLE_BASE}"
                - name: GFAL_DEPLOYMENT_HTTP_DENIED_BASE
                  value: "${GFAL_DEPLOYMENT_HTTP_DENIED_BASE}"
        EOF

        (
          for _ in $(seq 1 240); do
            POD=$(kubectl get pod -l job-name=gfal-dcache-tests -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            if [ -n "${POD}" ]; then
              echo "Streaming logs from ${POD}"
              kubectl logs -f "${POD}" --all-containers=true || true
              exit 0
            fi
            sleep 5
          done
        ) &
        LOG_PID=$!

        wait_for_job() {
          local job_name=$1
          local deadline=$(( $(date +%s) + 1200 ))
          while [ "$(date +%s)" -lt "${deadline}" ]; do
            succeeded=$(kubectl get job "${job_name}" -o jsonpath='{.status.succeeded}' 2>/dev/null || echo "")
            failed=$(kubectl get job "${job_name}" -o jsonpath='{.status.failed}' 2>/dev/null || echo "")
            if [ -n "${succeeded}" ] && [ "${succeeded}" -ge 1 ]; then
              return 0
            fi
            if [ -n "${failed}" ] && [ "${failed}" -ge 1 ]; then
              echo "Job ${job_name} failed"
              return 1
            fi
            sleep 5
          done
          echo "Timed out waiting for job ${job_name} to finish"
          return 124
        }

        if ! wait_for_job gfal-dcache-tests; then
          kill "${LOG_PID}" || true
          kubectl logs job/gfal-dcache-tests --all-containers=true --tail=-1 || true
          kubectl describe job gfal-dcache-tests || true
          kubectl get pods || true
          kubectl describe pod -l job-name=gfal-dcache-tests || true
          exit 1
        fi

        kill "${LOG_PID}" || true
        kubectl logs job/gfal-dcache-tests --all-containers=true --tail=-1

    - name: Dump dCache state on failure
      if: failure()
      run: |
        kubectl get pods || true
        kubectl get svc || true
        kubectl logs statefulset/store-dcache-door --all-containers=true --tail=100 || true
        kubectl logs statefulset/store-pool-a --all-containers=true --tail=100 || true

    - name: Stop dCache progress logger
      if: always()
      run: |
        if [ -f /tmp/k8s-progress.pid ]; then
          kill "$(cat /tmp/k8s-progress.pid)" || true
        fi

  deployment-integration-storm:
    name: Deployment Integration (StoRM kind)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v6

    - name: Free disk space
      run: |
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet \
          /opt/ghc /usr/local/share/boost /usr/share/swift \
          /opt/hostedtoolcache/CodeQL || true
        docker system prune -af --volumes || true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build deployment test runner image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: docker/Dockerfile.integration-runner
        load: true
        platforms: linux/amd64
        tags: gfal-integration-runner:latest
        cache-from: type=gha,scope=deployment-integration-runner
        cache-to: type=gha,mode=max,scope=deployment-integration-runner

    - name: Create kind cluster
      uses: helm/kind-action@v1

    - name: Load test runner image into kind
      run: kind load docker-image --name chart-testing gfal-integration-runner:latest

    - name: Start StoRM progress logger
      run: |
        cat > /tmp/k8s-progress.sh <<'SH'
        set -eu
        tick=0
        while true; do
          tick=$((tick + 1))
          echo "=== $(date -u +'%Y-%m-%dT%H:%M:%SZ') StoRM snapshot ${tick} ==="
          kubectl get pods -A -o wide || true
          kubectl get jobs -A || true
          if [ $((tick % 3)) -eq 0 ]; then
            kubectl get events -A --sort-by=.metadata.creationTimestamp | tail -n 30 || true
          fi
          sleep 20
        done
        SH
        bash /tmp/k8s-progress.sh &
        echo $! > /tmp/k8s-progress.pid

    - name: Clone StoRM WebDAV deployment chart
      run: git clone --depth=1 https://gitlab.com/ska-telescope/src/src-dm/ska-src-dm-storm-webdav-deployment.git /tmp/storm-webdav-deployment

    - name: Create StoRM TLS secret
      run: |
        kubectl create namespace storm
        openssl req -x509 -nodes -newkey rsa:2048 -days 2 \
          -subj "/CN=storm-webdav.storm.svc.cluster.local" \
          -addext "subjectAltName=DNS:storm-webdav.storm.svc.cluster.local,DNS:storm-webdav,DNS:localhost" \
          -keyout /tmp/storm-tls.key \
          -out /tmp/storm-tls.crt
        kubectl create secret tls storm-tls-secret \
          --namespace storm \
          --cert=/tmp/storm-tls.crt \
          --key=/tmp/storm-tls.key

    - name: Deploy StoRM WebDAV via Helm chart
      run: |
        helm install storm /tmp/storm-webdav-deployment/etc/helm \
          --namespace storm \
          --values ci/storm-values.yaml \
          --debug \
          --timeout 20m \
          --wait

    - name: Prepare StoRM deployment contract
      run: |
        chmod +x scripts/prepare-storm-kind-deployment.sh
        ./scripts/prepare-storm-kind-deployment.sh "gha-${GITHUB_RUN_ID}" storm >> "$GITHUB_ENV"

    - name: Run generic deployment integration tests inside kind
      run: |
        kubectl delete -n storm job gfal-storm-tests --ignore-not-found=true
        cat <<EOF | kubectl apply -f -
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: gfal-storm-tests
          namespace: storm
        spec:
          backoffLimit: 0
          template:
            spec:
              restartPolicy: Never
              containers:
              - name: tests
                image: gfal-integration-runner:latest
                imagePullPolicy: Never
                env:
                - name: GFAL_DEPLOYMENT_NAME
                  value: "${GFAL_DEPLOYMENT_NAME}"
                - name: GFAL_DEPLOYMENT_VERIFY_SSL
                  value: "${GFAL_DEPLOYMENT_VERIFY_SSL}"
                - name: GFAL_DEPLOYMENT_SUPPORTS_LISTING
                  value: "${GFAL_DEPLOYMENT_SUPPORTS_LISTING}"
                - name: GFAL_DEPLOYMENT_HTTP_WRITABLE_BASE
                  value: "${GFAL_DEPLOYMENT_HTTP_WRITABLE_BASE}"
                - name: GFAL_DEPLOYMENT_HTTP_DENIED_BASE
                  value: "${GFAL_DEPLOYMENT_HTTP_DENIED_BASE}"
        EOF

        (
          for _ in $(seq 1 240); do
            POD=$(kubectl get pod -n storm -l job-name=gfal-storm-tests -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            if [ -n "${POD}" ]; then
              echo "Streaming logs from ${POD}"
              kubectl logs -n storm -f "${POD}" --all-containers=true || true
              exit 0
            fi
            sleep 5
          done
        ) &
        LOG_PID=$!

        wait_for_job() {
          local namespace=$1
          local job_name=$2
          local deadline=$(( $(date +%s) + 1200 ))
          while [ "$(date +%s)" -lt "${deadline}" ]; do
            succeeded=$(kubectl get -n "${namespace}" job "${job_name}" -o jsonpath='{.status.succeeded}' 2>/dev/null || echo "")
            failed=$(kubectl get -n "${namespace}" job "${job_name}" -o jsonpath='{.status.failed}' 2>/dev/null || echo "")
            if [ -n "${succeeded}" ] && [ "${succeeded}" -ge 1 ]; then
              return 0
            fi
            if [ -n "${failed}" ] && [ "${failed}" -ge 1 ]; then
              echo "Job ${namespace}/${job_name} failed"
              return 1
            fi
            sleep 5
          done
          echo "Timed out waiting for job ${namespace}/${job_name} to finish"
          return 124
        }

        if ! wait_for_job storm gfal-storm-tests; then
          kill "${LOG_PID}" || true
          kubectl logs -n storm job/gfal-storm-tests --all-containers=true --tail=-1 || true
          kubectl describe -n storm job gfal-storm-tests || true
          kubectl get pods -n storm || true
          kubectl describe -n storm pod -l job-name=gfal-storm-tests || true
          exit 1
        fi

        kill "${LOG_PID}" || true
        kubectl logs -n storm job/gfal-storm-tests --all-containers=true --tail=-1

    - name: Dump StoRM state on failure
      if: failure()
      run: |
        kubectl get pods -n storm || true
        kubectl get svc -n storm || true
        kubectl get events -n storm --sort-by=.metadata.creationTimestamp | tail -n 50 || true
        kubectl describe pod -n storm -l app=storm-webdav || true
        POD=$(kubectl get pod -n storm -l app=storm-webdav -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
        if [ -n "${POD}" ]; then
          kubectl logs -n storm "${POD}" -c storm-webdav --tail=200 || true
          kubectl logs -n storm "${POD}" -c storm-webdav --previous --tail=200 || true
          kubectl logs -n storm "${POD}" -c prepare-ca-certificates --tail=200 || true
          kubectl logs -n storm "${POD}" -c change-ownership-of-sa-to-storm-user --tail=200 || true
        fi

    - name: Stop StoRM progress logger
      if: always()
      run: |
        if [ -f /tmp/k8s-progress.pid ]; then
          kill "$(cat /tmp/k8s-progress.pid)" || true
        fi

  # ---------------------------------------------------------------------------
  # 2. Packaging
  # ---------------------------------------------------------------------------

  build:
    name: Build distribution 📦
    needs: [ codespell, pre-commit, tests, xrootd, integration ]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: "3.x"
    - name: Install build dependencies
      run: python -m pip install build hatchling hatch-vcs
    - name: Build sdist and wheel
      run: python -m build
    - name: Store distributions
      uses: actions/upload-artifact@v7
      with:
        name: python-package-distributions
        path: dist/

  build-rpm:
    name: Build RPM 📦 (${{ matrix.os.name }}) [${{ matrix.arch }}]
    needs: [ build ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os:
        - image: almalinux:9
          name: el9
        - image: almalinux:10
          name: el10
        arch: [ x86_64, aarch64 ]
    steps:
    - name: Set up QEMU
      if: matrix.arch == 'aarch64'
      uses: docker/setup-qemu-action@v4
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Build RPM in Container
      run: |
        docker run --rm \
          --platform linux/${{ matrix.arch == 'x86_64' && 'amd64' || 'arm64' }} \
          -v ${{ github.workspace }}:/workspace -w /workspace \
          ${{ matrix.os.image }} \
          bash -c "dnf install -y git rpm-build make python3-devel python3-pip && \
                   git config --global --add safe.directory '*' && \
                   python3 -m pip install build hatchling hatch-vcs && \
                   make rpm"
    - name: Store RPMs
      uses: actions/upload-artifact@v7
      with:
        name: rpm-package-distributions-${{ matrix.os.name }}-${{ matrix.arch }}
        path: rpmbuild/RPMS/*/*.rpm

  # ---------------------------------------------------------------------------
  # 3. Validation & Repository Update
  # ---------------------------------------------------------------------------

  test-install:
    name: Test Install 🧪 (${{ matrix.target.name }})
    needs: [ build-rpm ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
        - name: AlmaLinux 9
          container: almalinux:9
          artifact: rpm-package-distributions-el9-x86_64
          install_cmd: |
            dnf install -y epel-release dnf-plugins-core
            dnf config-manager --set-enabled crb
            find . -name "*.rpm" -exec dnf install -y {} +
        - name: AlmaLinux 10
          container: almalinux:10
          artifact: rpm-package-distributions-el10-x86_64
          install_cmd: |
            dnf install -y epel-release
            find . -name "*.rpm" -exec dnf install -y {} +
    container: ${{ matrix.target.container }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/download-artifact@v8
      with:
        name: ${{ matrix.target.artifact }}
        path: rpms/
    - name: Install package
      run: |
        cd rpms
        ${{ matrix.target.install_cmd }}
    - name: Verify executables
      run: |
        command -v gfal
        gfal --help
    - name: Install pip and test dependencies
      run: |
        python3 -m ensurepip --upgrade || dnf install -y python3-pip
        python3 -m pip install --no-cache-dir pytest pytest-asyncio pytest-xdist pytest-cov pytest-rerunfailures
    - name: Run tests against installed package
      run: python3 -m pytest tests/ -q -m "not integration and not xrootd" --override-ini="addopts="

  update-repo:
    name: Update YUM Repository 🌐
    needs: [ build-rpm, test-install ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/download-artifact@v8
      with:
        name: rpm-package-distributions-el9-x86_64
        path: artifacts/el9-x86_64/
    - uses: actions/download-artifact@v8
      with:
        name: rpm-package-distributions-el9-aarch64
        path: artifacts/el9-aarch64/
    - uses: actions/download-artifact@v8
      with:
        name: rpm-package-distributions-el10-x86_64
        path: artifacts/el10-x86_64/
    - uses: actions/download-artifact@v8
      with:
        name: rpm-package-distributions-el10-aarch64
        path: artifacts/el10-aarch64/
    - name: Install tools
      run: |
        sudo apt-get update && sudo apt-get install -y createrepo-c rpm
        pip install mkdocs-material
    - name: Build Docs 📚
      run: mkdocs build
    - name: Prepare Repository
      run: |
        mkdir -p site/rpm/el9/x86_64 site/rpm/el9/aarch64 site/rpm/el10/x86_64 site/rpm/el10/aarch64

        # Publish a single canonical noarch RPM from the x86_64 build into
        # both architecture-specific repos. Uploading all build artifacts into
        # one flat directory can produce duplicate noarch filenames where the
        # last copy wins nondeterministically.
        find artifacts/el9-x86_64/ -name "*noarch.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el9/x86_64/ \;
        find artifacts/el9-x86_64/ -name "*noarch.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el9/aarch64/ \;
        find artifacts/el10-x86_64/ -name "*noarch.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el10/x86_64/ \;
        find artifacts/el10-x86_64/ -name "*noarch.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el10/aarch64/ \;

        find artifacts/el9-x86_64/ -name "*x86_64.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el9/x86_64/ \;
        find artifacts/el9-aarch64/ -name "*aarch64.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el9/aarch64/ \;
        find artifacts/el10-x86_64/ -name "*x86_64.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el10/x86_64/ \;
        find artifacts/el10-aarch64/ -name "*aarch64.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el10/aarch64/ \;

        for rpm_file in site/rpm/el*/*/*.rpm; do
          rpm -Kv "$rpm_file"
        done

        for d in site/rpm/el*/*/; do
          test -n "$(find "$d" -maxdepth 1 -name '*.rpm' -print -quit)" || {
            echo "No RPMs copied into $d"
            exit 1
          }
        done
        for d in site/rpm/el*/*/; do createrepo_c "$d"; done

        cat <<EOF > site/rpm/gfal.repo
        [gfal]
        name=gfal repository
        baseurl=https://lobis.github.io/gfal/rpm/el\$releasever/\$basearch/
        enabled=1
        gpgcheck=0
        EOF
    - uses: actions/upload-pages-artifact@v5
      with:
        path: ./site/
    - uses: actions/deploy-pages@v5
      id: deployment

  publish-to-pypi:
    name: Publish to PyPI 🚀
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ build, build-rpm, test-install ]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gfal
    permissions:
      id-token: write
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: python-package-distributions
        path: dist/
    - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release 🚀
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ build, build-rpm, test-install ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: python-package-distributions
        path: release-artifacts/python/
    - uses: actions/download-artifact@v8
      with:
        name: rpm-package-distributions-el9-x86_64
        path: release-artifacts/rpm/el9-x86_64/
    - uses: actions/download-artifact@v8
      with:
        name: rpm-package-distributions-el9-aarch64
        path: release-artifacts/rpm/el9-aarch64/
    - uses: actions/download-artifact@v8
      with:
        name: rpm-package-distributions-el10-x86_64
        path: release-artifacts/rpm/el10-x86_64/
    - uses: actions/download-artifact@v8
      with:
        name: rpm-package-distributions-el10-aarch64
        path: release-artifacts/rpm/el10-aarch64/
    - name: Prepare Release Files
      run: |
        mkdir -p release-upload

        cp -a release-artifacts/python/. release-upload/

        # As with the Pages repo, publish a single canonical noarch RPM from
        # the x86_64 build for each EL release to avoid duplicate filenames
        # from different build artifacts overwriting each other.
        find release-artifacts/rpm/el9-x86_64/ -name "*noarch.rpm" ! -name "*.src.rpm" -exec cp {} release-upload/ \;
        find release-artifacts/rpm/el10-x86_64/ -name "*noarch.rpm" ! -name "*.src.rpm" -exec cp {} release-upload/ \;

        find release-artifacts/rpm/el9-x86_64/ -name "*x86_64.rpm" ! -name "*.src.rpm" -exec cp {} release-upload/ \;
        find release-artifacts/rpm/el9-aarch64/ -name "*aarch64.rpm" ! -name "*.src.rpm" -exec cp {} release-upload/ \;
        find release-artifacts/rpm/el10-x86_64/ -name "*x86_64.rpm" ! -name "*.src.rpm" -exec cp {} release-upload/ \;
        find release-artifacts/rpm/el10-aarch64/ -name "*aarch64.rpm" ! -name "*.src.rpm" -exec cp {} release-upload/ \;

        find release-artifacts/rpm/ -name "*.src.rpm" -exec cp {} release-upload/ \;
    - uses: softprops/action-gh-release@v3
      with:
        files: release-upload/**/*
        generate_release_notes: true

  verify-deployment:
    name: Verify Deployment 🔍 (${{ matrix.target.name }})
    needs: [ update-repo, publish-to-pypi, github-release ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
        - name: AlmaLinux 9
          container: almalinux:9
          install_cmd: |
            dnf install -y --allowerasing epel-release curl dnf-plugins-core
            dnf config-manager --set-enabled crb
            curl -fsSL -o /etc/yum.repos.d/gfal.repo https://lobis.github.io/gfal/rpm/gfal.repo
            for i in {1..18}; do \
              dnf clean all && \
              dnf makecache && \
              dnf repoquery --available python3-gfal && \
              dnf install -y --allowerasing python3-gfal && break || sleep 10; \
            done
            rpm -q python3-gfal
        - name: AlmaLinux 10
          container: almalinux:10
          install_cmd: |
            dnf install -y --allowerasing epel-release curl dnf-plugins-core
            # crb is enabled by default in AlmaLinux 10, but dnf-plugins-core is still good practice
            curl -fsSL -o /etc/yum.repos.d/gfal.repo https://lobis.github.io/gfal/rpm/gfal.repo
            for i in {1..18}; do \
              dnf clean all && \
              dnf makecache && \
              dnf repoquery --available python3-gfal && \
              dnf install -y --allowerasing python3-gfal && break || sleep 10; \
            done
            rpm -q python3-gfal
        - name: PyPI
          container: python:3.12-slim
          install_cmd: |
            i=1
            while [ "$i" -le 18 ]; do
              if pip install --no-cache-dir "gfal==$EXPECTED_VERSION"; then
                break
              fi
              if [ "$i" -eq 18 ]; then
                echo "❌ Timed out waiting for gfal==$EXPECTED_VERSION to appear on PyPI"
                exit 1
              fi
              sleep 10
              i=$((i + 1))
            done
    container: ${{ matrix.target.container }}
    steps:
    - name: Install and Verify
      run: |
        EXPECTED_VERSION=${{ github.ref_name }}
        EXPECTED_VERSION=${EXPECTED_VERSION#v}
        export EXPECTED_VERSION
        ${{ matrix.target.install_cmd }}
        export PATH=$PATH:/usr/local/bin
        command -v gfal || exit 1
        INSTALLED_VERSION=$(gfal --version | awk '{print $NF}')
        if [ "$INSTALLED_VERSION" != "$EXPECTED_VERSION" ]; then
          echo "❌ Version mismatch: $INSTALLED_VERSION != $EXPECTED_VERSION"
          exit 1
        fi
