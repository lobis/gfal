name: CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
  schedule:
    - cron: '30 0 * * *'  # 00:30 UTC daily
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Tests & Linting
  # ---------------------------------------------------------------------------

  codespell:
    name: Codespell spell-check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: codespell-project/actions-codespell@v2
      with:
        ignore_words_list: cern,xrootd,fsspec,gfal,adler,aiohttp,thirdparty,scitag

  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir pre-commit
    - name: Run pre-commit
      run: pre-commit run --all-files

  tests:
    name: Tests (${{ matrix.os }}, Py ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: [ "3.9", "3.10", "3.11", "3.12", "3.13", "3.14" ]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir ".[dev]"
    - name: Run unit and functional tests
      run: pytest tests/ -v -m "not integration and not xrootd" --cov=gfal --cov-report=xml
    - name: Upload coverage
      if: ${{ !env.ACT }}
      continue-on-error: true
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        flags: unittests
        fail_ci_if_error: false

  xrootd:
    name: XRootD Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir ".[dev]"
    - name: Run XRootD tests
      run: pytest tests/ -v -m xrootd

  integration:
    name: Integration Tests (EOS)
    runs-on: ubuntu-latest
    env:
      PYTHON3_GFAL_SERVICE_ACCOUNT_P12: ${{ secrets.PYTHON3_GFAL_SERVICE_ACCOUNT_P12 }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir ".[dev]"
        sudo apt-get update
        sudo apt-get install -y globus-proxy-utils
    - name: Set up EOS service account credentials
      if: env.PYTHON3_GFAL_SERVICE_ACCOUNT_P12 != ''
      run: |
        CERT_TMPDIR=$(mktemp -d)
        export CERT_TMPDIR
        trap 'rm -rf "$CERT_TMPDIR" /tmp/usercert.pem /tmp/userkey.pem' EXIT
        echo "$PYTHON3_GFAL_SERVICE_ACCOUNT_P12" | base64 -d > "$CERT_TMPDIR/service_account.p12"
        openssl pkcs12 -in "$CERT_TMPDIR/service_account.p12" -clcerts -nokeys -passin pass: -out "$CERT_TMPDIR/usercert.pem"
        openssl pkcs12 -in "$CERT_TMPDIR/service_account.p12" -nocerts -nodes -passin pass: -out "$CERT_TMPDIR/userkey.pem"
        cp "$CERT_TMPDIR/usercert.pem" /tmp/usercert.pem
        cp "$CERT_TMPDIR/userkey.pem" /tmp/userkey.pem
        chown "$(id -u):$(id -g)" /tmp/usercert.pem /tmp/userkey.pem
        chmod 600 /tmp/usercert.pem /tmp/userkey.pem
        ls -ln /tmp/usercert.pem /tmp/userkey.pem
        CERT_EXPIRY=$(openssl x509 -in /tmp/usercert.pem -noout -enddate | cut -d= -f2)
        echo "Service account certificate expires: ${CERT_EXPIRY}"
        if openssl x509 -in /tmp/usercert.pem -noout -checkend 2592000 > /dev/null 2>&1; then
          echo "Certificate is valid for at least 30 days."
        else
          echo "::warning::Service account certificate expires within 30 days (${CERT_EXPIRY})! Renew it at https://ca.cern.ch/ca/"
        fi
        grid-proxy-init -cert /tmp/usercert.pem -key /tmp/userkey.pem -out /tmp/x509proxy -valid 12:00 -q
        PROXY_EXPIRY=$(openssl x509 -in /tmp/x509proxy -noout -enddate | cut -d= -f2)
        echo "X.509 proxy generated, expires: ${PROXY_EXPIRY}"
        echo "X509_USER_PROXY=/tmp/x509proxy" >> "$GITHUB_ENV"
    - name: Run integration tests
      # Keep this CI job focused on the core EOS coverage and avoid the long tail
      # of slower pilot/xrootd cases that can make the workflow appear stuck near
      # completion. The dedicated Alma compare job covers legacy/new parity
      # separately.
      run: |
        timeout 30m pytest -v -rs \
          tests/test_integration_eospublic.py \
          tests/test_integration_eospilot.py -k "not TestEosPilotTpc and not TestEosPilotXrootd and not TestEosPilotMkdirRm and not test_copy_large_file"

  integration-compare-gfal2:
    name: Integration Compare Tests (Alma Docker)
    runs-on: ubuntu-latest
    env:
      PYTHON3_GFAL_SERVICE_ACCOUNT_P12: ${{ secrets.PYTHON3_GFAL_SERVICE_ACCOUNT_P12 }}
    # This job is informative on PRs but should not block unrelated changes.
    # It exercises an Alma + legacy gfal2 comparison stack that is known to be flaky
    # due to old upstream bindings/runtime issues outside this repo.
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install local test dependencies
      run: pip install --no-cache-dir ".[dev]"
    - name: Install host proxy tooling
      run: |
        sudo apt-get update
        sudo apt-get install -y globus-proxy-utils
    - name: Build Alma Docker comparison image
      run: docker build --platform linux/amd64 -t xrootd-cern-test -f docker/Dockerfile.xrootd-cern-test .
    - name: Set up EOS service account credentials
      if: env.PYTHON3_GFAL_SERVICE_ACCOUNT_P12 != ''
      run: |
        CERT_TMPDIR=$(mktemp -d)
        export CERT_TMPDIR
        trap 'rm -rf "$CERT_TMPDIR" /tmp/usercert.pem /tmp/userkey.pem /tmp/gfal-tmp-proxy' EXIT
        echo "$PYTHON3_GFAL_SERVICE_ACCOUNT_P12" | base64 -d > "$CERT_TMPDIR/service_account.p12"
        openssl pkcs12 -in "$CERT_TMPDIR/service_account.p12" -clcerts -nokeys -passin pass: -out /tmp/usercert.pem
        openssl pkcs12 -in "$CERT_TMPDIR/service_account.p12" -nocerts -nodes -passin pass: -out /tmp/userkey.pem
        chown "$(id -u):$(id -g)" /tmp/usercert.pem /tmp/userkey.pem
        chmod 600 /tmp/usercert.pem /tmp/userkey.pem
        ls -ln /tmp/usercert.pem /tmp/userkey.pem
        grid-proxy-init -cert /tmp/usercert.pem -key /tmp/userkey.pem -out /tmp/gfal-tmp-proxy -valid 12:00 -q
        ls -ln /tmp/gfal-tmp-proxy
        echo "X509_USER_PROXY=/tmp/gfal-tmp-proxy" >> "$GITHUB_ENV"
    - name: Run gfal vs gfal2 comparison tests
      if: env.PYTHON3_GFAL_SERVICE_ACCOUNT_P12 != ''
      run: pytest tests/test_integration_compare_gfal2.py -v --tb=short

  # ---------------------------------------------------------------------------
  # 2. Packaging
  # ---------------------------------------------------------------------------

  build:
    name: Build distribution 📦
    needs: [ codespell, pre-commit, tests, xrootd, integration ]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: "3.x"
    - name: Install build dependencies
      run: python -m pip install build hatchling hatch-vcs
    - name: Build sdist and wheel
      run: python -m build
    - name: Store distributions
      uses: actions/upload-artifact@v7
      with:
        name: python-package-distributions
        path: dist/

  build-rpm:
    name: Build RPM 📦 (${{ matrix.os.name }}) [${{ matrix.arch }}]
    needs: [ build ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os:
        - image: almalinux:9
          name: el9
        - image: almalinux:10
          name: el10
        arch: [ x86_64, aarch64 ]
    steps:
    - name: Set up QEMU
      if: matrix.arch == 'aarch64'
      uses: docker/setup-qemu-action@v4
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Build RPM in Container
      run: |
        docker run --rm \
          --platform linux/${{ matrix.arch == 'x86_64' && 'amd64' || 'arm64' }} \
          -v ${{ github.workspace }}:/workspace -w /workspace \
          ${{ matrix.os.image }} \
          bash -c "dnf install -y git rpm-build make python3-devel python3-pip && \
                   git config --global --add safe.directory '*' && \
                   python3 -m pip install build hatchling hatch-vcs && \
                   make rpm"
    - name: Store RPMs
      uses: actions/upload-artifact@v7
      with:
        name: rpm-package-distributions-${{ matrix.os.name }}-${{ matrix.arch }}
        path: rpmbuild/RPMS/*/*.rpm

  # ---------------------------------------------------------------------------
  # 3. Validation & Repository Update
  # ---------------------------------------------------------------------------

  test-install:
    name: Test Install 🧪 (${{ matrix.target.name }})
    needs: [ build-rpm ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
        - name: AlmaLinux 9
          container: almalinux:9
          artifact: rpm-package-distributions-el9-x86_64
          install_cmd: |
            dnf install -y epel-release dnf-plugins-core
            dnf config-manager --set-enabled crb
            find . -name "*.rpm" -exec dnf install -y {} +
        - name: AlmaLinux 10
          container: almalinux:10
          artifact: rpm-package-distributions-el10-x86_64
          install_cmd: |
            dnf install -y epel-release
            find . -name "*.rpm" -exec dnf install -y {} +
    container: ${{ matrix.target.container }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/download-artifact@v8
      with:
        name: ${{ matrix.target.artifact }}
        path: rpms/
    - name: Install package
      run: |
        cd rpms
        ${{ matrix.target.install_cmd }}
    - name: Verify executables
      run: |
        command -v gfal
        gfal --help
    - name: Install pip and test dependencies
      run: |
        python3 -m ensurepip --upgrade || dnf install -y python3-pip
        python3 -m pip install --no-cache-dir pytest pytest-asyncio pytest-xdist pytest-cov pytest-rerunfailures
    - name: Run tests against installed package
      run: python3 -m pytest tests/ -q -m "not integration and not xrootd" --override-ini="addopts="

  update-repo:
    name: Update YUM Repository 🌐
    needs: [ build-rpm, test-install ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/download-artifact@v8
      with:
        path: artifacts/
        merge-multiple: true
    - name: Install tools
      run: |
        sudo apt-get update && sudo apt-get install -y createrepo-c
        pip install mkdocs-material
    - name: Build Docs 📚
      run: mkdocs build
    - name: Prepare Repository
      run: |
        mkdir -p site/rpm/el9/x86_64 site/rpm/el9/aarch64 site/rpm/el10/x86_64 site/rpm/el10/aarch64

        # Publish noarch RPMs to both architecture-specific repos so DNF can
        # resolve the package from the current baseurl layout, while still
        # keeping room for arch-specific RPMs in the future.
        find artifacts/ -name "*el9*noarch.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el9/x86_64/ \;
        find artifacts/ -name "*el9*noarch.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el9/aarch64/ \;
        find artifacts/ -name "*el10*noarch.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el10/x86_64/ \;
        find artifacts/ -name "*el10*noarch.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el10/aarch64/ \;

        find artifacts/ -name "*el9*x86_64.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el9/x86_64/ \;
        find artifacts/ -name "*el9*aarch64.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el9/aarch64/ \;
        find artifacts/ -name "*el10*x86_64.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el10/x86_64/ \;
        find artifacts/ -name "*el10*aarch64.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el10/aarch64/ \;

        for d in site/rpm/el*/*/; do
          test -n "$(find "$d" -maxdepth 1 -name '*.rpm' -print -quit)" || {
            echo "No RPMs copied into $d"
            exit 1
          }
        done
        for d in site/rpm/el*/*/; do createrepo_c "$d"; done

        cat <<EOF > site/rpm/gfal.repo
        [gfal]
        name=gfal repository
        baseurl=https://lobis.github.io/gfal/rpm/el\$releasever/\$basearch/
        enabled=1
        gpgcheck=0
        EOF
    - uses: actions/upload-pages-artifact@v5
      with:
        path: ./site/
    - uses: actions/deploy-pages@v5
      id: deployment

  publish-to-pypi:
    name: Publish to PyPI 🚀
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ build, build-rpm, test-install ]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gfal
    permissions:
      id-token: write
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: python-package-distributions
        path: dist/
    - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release 🚀
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ build, build-rpm, test-install ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v8
      with:
        path: artifacts/
        merge-multiple: true
    - uses: softprops/action-gh-release@v3
      with:
        files: artifacts/**/*
        generate_release_notes: true

  verify-deployment:
    name: Verify Deployment 🔍 (${{ matrix.target.name }})
    needs: [ update-repo, publish-to-pypi, github-release ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
        - name: AlmaLinux 9
          container: almalinux:9
          install_cmd: |
            dnf install -y --allowerasing epel-release curl dnf-plugins-core
            dnf config-manager --set-enabled crb
            curl -fsSL -o /etc/yum.repos.d/gfal.repo https://lobis.github.io/gfal/rpm/gfal.repo
            for i in {1..18}; do \
              dnf clean all && \
              dnf makecache && \
              dnf repoquery --available python3-gfal && \
              dnf install -y --allowerasing python3-gfal && break || sleep 10; \
            done
            rpm -q python3-gfal
        - name: AlmaLinux 10
          container: almalinux:10
          install_cmd: |
            dnf install -y --allowerasing epel-release curl dnf-plugins-core
            # crb is enabled by default in AlmaLinux 10, but dnf-plugins-core is still good practice
            curl -fsSL -o /etc/yum.repos.d/gfal.repo https://lobis.github.io/gfal/rpm/gfal.repo
            for i in {1..18}; do \
              dnf clean all && \
              dnf makecache && \
              dnf repoquery --available python3-gfal && \
              dnf install -y --allowerasing python3-gfal && break || sleep 10; \
            done
            rpm -q python3-gfal
        - name: PyPI
          container: python:3.12-slim
          install_cmd: |
            for i in {1..12}; do pip install --no-cache-dir gfal && break || sleep 10; done
    container: ${{ matrix.target.container }}
    steps:
    - name: Install and Verify
      run: |
        ${{ matrix.target.install_cmd }}
        export PATH=$PATH:/usr/local/bin
        command -v gfal || exit 1
        INSTALLED_VERSION=$(gfal --version | awk '{print $NF}')
        EXPECTED_VERSION=${{ github.ref_name }}
        EXPECTED_VERSION=${EXPECTED_VERSION#v}
        if [ "$INSTALLED_VERSION" != "$EXPECTED_VERSION" ]; then
          echo "❌ Version mismatch: $INSTALLED_VERSION != $EXPECTED_VERSION"
          exit 1
        fi
