name: CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
  schedule:
    - cron: '30 0 * * *'  # 00:30 UTC daily
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_COLOR: "1"

jobs:
  # ---------------------------------------------------------------------------
  # 1. Tests & Linting
  # ---------------------------------------------------------------------------

  codespell:
    name: Codespell spell-check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: codespell-project/actions-codespell@v2
      with:
        ignore_words_list: cern,xrootd,fsspec,gfal,adler,aiohttp,thirdparty,scitag

  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: pyproject.toml
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir pre-commit
    - name: Run pre-commit
      run: pre-commit run --all-files

  tests:
    name: Tests (${{ matrix.os }}, Py ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        python-version: [ "3.9", "3.10", "3.11", "3.12", "3.13", "3.14" ]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: pyproject.toml
    - name: Install package and test dependencies
      run: pip install --no-cache-dir ".[dev]"
    - name: Run unit and functional tests
      run: pytest tests/ -v -m "not integration and not xrootd and not mount" --cov=gfal --cov-report=xml
    - name: Upload coverage
      if: ${{ !env.ACT }}
      continue-on-error: true
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        flags: unittests
        fail_ci_if_error: false

  xrootd:
    name: XRootD Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Cache conda packages
      uses: actions/cache@v5
      with:
        path: ${{ runner.temp }}/conda_pkgs_dir
        key: ${{ runner.os }}-conda-pkgs-v1-${{ hashFiles('pyproject.toml', 'recipe/meta.yaml', '.github/workflows/ci.yml') }}
    - uses: conda-incubator/setup-miniconda@v4
      with:
        activate-environment: xrootd-test
        auto-activate-base: false
        channels: conda-forge
        channel-priority: strict
        miniforge-variant: Miniforge3
        python-version: "3.11"
        pkgs-dirs: ${{ runner.temp }}/conda_pkgs_dir
    - name: Install XRootD runtime via conda
      shell: bash -el {0}
      run: conda install -y xrootd
    - name: Install Python dependencies
      shell: bash -el {0}
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir ".[dev]"
    - name: Run XRootD tests
      shell: bash -el {0}
      run: pytest tests/ -v -m xrootd

  sftp:
    name: SFTP Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: pyproject.toml
    - name: Install package and test dependencies
      run: |
        pip install --no-cache-dir ".[dev,ssh]"
    - name: Run SFTP tests
      run: pytest tests/ -v -m sftp

  s3:
    name: S3 Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: pyproject.toml
    - name: Install package and test dependencies
      run: |
        pip install --no-cache-dir ".[dev,s3]"
        pip install --no-cache-dir "moto[server]"
    - name: Run S3 tests
      run: pytest tests/ -v -m s3

  mount:
    name: Mount Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: pyproject.toml
    - name: Check FUSE runtime
      run: |
        if [ "${RUNNER_OS}" = "Linux" ]; then
          sudo apt-get update
          sudo apt-get install -y fuse3 libfuse3-3
          if [ ! -e /dev/fuse ] && command -v modprobe >/dev/null 2>&1; then
            sudo modprobe fuse
          fi
          if [ ! -e /dev/fuse ]; then
            if [ -n "${ACT:-}" ]; then
              echo "::warning::/dev/fuse is unavailable under act; skipping mount integration tests"
              echo "SKIP_INTEGRATION_MOUNT_TESTS=1" >> "$GITHUB_ENV"
              exit 0
            fi
            echo "/dev/fuse is required for mount integration tests"
            exit 1
          fi
          ls -l /dev/fuse
          sudo chmod 666 /dev/fuse
          fusermount3 --version
        else
          if [ ! -e /Library/Filesystems/macfuse.fs ]; then
            echo "::warning::macFUSE is not available on this runner; skipping mount integration tests"
            echo "SKIP_INTEGRATION_MOUNT_TESTS=1" >> "$GITHUB_ENV"
          fi
        fi
    - name: Install package and mount test dependencies
      run: |
        pip install --no-cache-dir ".[dev,mount]"
    - name: Run mount unit tests
      run: pytest -n 0 -v tests/test_mount.py
    - name: Run mount integration tests
      if: env.SKIP_INTEGRATION_MOUNT_TESTS != '1'
      run: pytest -n 0 -v tests/test_integration_mount.py

  integration:
    name: Integration Tests (EOS)
    runs-on: ubuntu-latest
    env:
      PYTHON3_GFAL_SERVICE_ACCOUNT_P12: ${{ secrets.PYTHON3_GFAL_SERVICE_ACCOUNT_P12 }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/cache@v5
      with:
        path: ${{ runner.temp }}/conda_pkgs_dir
        key: ${{ runner.os }}-conda-eos-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-conda-eos-
    - uses: conda-incubator/setup-miniconda@v4
      with:
        activate-environment: eos-integration
        auto-activate-base: false
        channels: conda-forge
        channel-priority: strict
        miniforge-variant: Miniforge3
        python-version: "3.11"
        pkgs-dirs: ${{ runner.temp }}/conda_pkgs_dir
    - name: Install dependencies
      shell: bash -el {0}
      run: |
        conda install -y xrootd
        python -m pip install --upgrade pip
        pip install --no-cache-dir ".[dev]"
        sudo apt-get update
        sudo apt-get install -y globus-proxy-utils
    - name: Build Docker integration image
      run: docker build --platform linux/amd64 -t xrootd-cern-test -f docker/Dockerfile.xrootd-cern-test .
    - name: Set up EOS service account credentials
      if: env.PYTHON3_GFAL_SERVICE_ACCOUNT_P12 != ''
      run: |
        CERT_TMPDIR=$(mktemp -d)
        export CERT_TMPDIR
        trap 'rm -rf "$CERT_TMPDIR" /tmp/usercert.pem /tmp/userkey.pem' EXIT
        echo "$PYTHON3_GFAL_SERVICE_ACCOUNT_P12" | base64 -d > "$CERT_TMPDIR/service_account.p12"
        openssl pkcs12 -in "$CERT_TMPDIR/service_account.p12" -clcerts -nokeys -passin pass: -out "$CERT_TMPDIR/usercert.pem"
        openssl pkcs12 -in "$CERT_TMPDIR/service_account.p12" -nocerts -nodes -passin pass: -out "$CERT_TMPDIR/userkey.pem"
        cp "$CERT_TMPDIR/usercert.pem" /tmp/usercert.pem
        cp "$CERT_TMPDIR/userkey.pem" /tmp/userkey.pem
        chown "$(id -u):$(id -g)" /tmp/usercert.pem /tmp/userkey.pem
        chmod 600 /tmp/usercert.pem /tmp/userkey.pem
        ls -ln /tmp/usercert.pem /tmp/userkey.pem
        CERT_EXPIRY=$(openssl x509 -in /tmp/usercert.pem -noout -enddate | cut -d= -f2)
        echo "Service account certificate expires: ${CERT_EXPIRY}"
        if openssl x509 -in /tmp/usercert.pem -noout -checkend 2592000 > /dev/null 2>&1; then
          echo "Certificate is valid for at least 30 days."
        else
          echo "::warning::Service account certificate expires within 30 days (${CERT_EXPIRY})! Renew it at https://ca.cern.ch/ca/"
        fi
        grid-proxy-init -cert /tmp/usercert.pem -key /tmp/userkey.pem -out /tmp/x509proxy -valid 12:00 -q
        PROXY_EXPIRY=$(openssl x509 -in /tmp/x509proxy -noout -enddate | cut -d= -f2)
        echo "X.509 proxy generated, expires: ${PROXY_EXPIRY}"
        echo "X509_USER_PROXY=/tmp/x509proxy" >> "$GITHUB_ENV"
    - name: Run integration tests
      shell: bash -el {0}
      run: |
        timeout 30m pytest -v -rs \
          --reruns 3 --reruns-delay 10 \
          tests/test_integration_eospublic.py \
          tests/test_integration_eospilot.py

  integration-compare-gfal2:
    name: Integration Compare Tests (Alma Docker)
    runs-on: ubuntu-latest
    env:
      PYTHON3_GFAL_SERVICE_ACCOUNT_P12: ${{ secrets.PYTHON3_GFAL_SERVICE_ACCOUNT_P12 }}
    # This job is informative on PRs but should not block unrelated changes.
    # It exercises an Alma + legacy gfal2 comparison stack that is known to be flaky
    # due to old upstream bindings/runtime issues outside this repo.
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: pyproject.toml
    - name: Install local test dependencies
      run: pip install --no-cache-dir ".[dev]"
    - name: Install host proxy tooling
      run: |
        sudo apt-get update
        sudo apt-get install -y globus-proxy-utils
    - name: Build Alma Docker comparison image
      run: docker build --platform linux/amd64 -t xrootd-cern-test -f docker/Dockerfile.xrootd-cern-test .
    - name: Set up EOS service account credentials
      if: env.PYTHON3_GFAL_SERVICE_ACCOUNT_P12 != ''
      run: |
        CERT_TMPDIR=$(mktemp -d)
        export CERT_TMPDIR
        trap 'rm -rf "$CERT_TMPDIR" /tmp/usercert.pem /tmp/userkey.pem' EXIT
        echo "$PYTHON3_GFAL_SERVICE_ACCOUNT_P12" | base64 -d > "$CERT_TMPDIR/service_account.p12"
        openssl pkcs12 -in "$CERT_TMPDIR/service_account.p12" -clcerts -nokeys -passin pass: -out /tmp/usercert.pem
        openssl pkcs12 -in "$CERT_TMPDIR/service_account.p12" -nocerts -nodes -passin pass: -out /tmp/userkey.pem
        chown "$(id -u):$(id -g)" /tmp/usercert.pem /tmp/userkey.pem
        chmod 600 /tmp/usercert.pem /tmp/userkey.pem
        ls -ln /tmp/usercert.pem /tmp/userkey.pem
        grid-proxy-init -cert /tmp/usercert.pem -key /tmp/userkey.pem -out /tmp/gfal-tmp-proxy -valid 12:00 -q
        ls -ln /tmp/gfal-tmp-proxy
        echo "X509_USER_PROXY=/tmp/gfal-tmp-proxy" >> "$GITHUB_ENV"
    - name: Run gfal vs gfal2 comparison tests
      if: env.PYTHON3_GFAL_SERVICE_ACCOUNT_P12 != ''
      run: pytest tests/test_integration_compare_gfal2.py -v --tb=short

  deployment-integration:
    name: Deployment Integration (EOS k3s)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, Linux, X64, gfal-k3s]
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      EOS_NAMESPACE: eos-${{ github.run_id }}
      EOS_IMAGE_REPO: gitlab-registry.cern.ch/dss/eos/eos-ci
      EOS_IMAGE_TAG: 5.4.1.el9
      GFAL_HOST_WORKSPACE: ${{ github.workspace }}
      PYTHON3_GFAL_SERVICE_ACCOUNT_P12: ${{ secrets.PYTHON3_GFAL_SERVICE_ACCOUNT_P12 }}
    steps:
    - name: Repair self-hosted workspace permissions
      run: |
        sudo mkdir -p "${GITHUB_WORKSPACE}"
        sudo chown -R "$(id -u):$(id -g)" "${GITHUB_WORKSPACE}" || true
        sudo chmod -R u+rwX "${GITHUB_WORKSPACE}" || true
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: pyproject.toml

    - name: Install local test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir ".[dev]"
        sudo apt-get update
        sudo apt-get install -y globus-proxy-utils

    - name: Set up EOS service account credentials
      if: env.PYTHON3_GFAL_SERVICE_ACCOUNT_P12 != ''
      run: |
        CERT_TMPDIR=$(mktemp -d)
        export CERT_TMPDIR
        trap 'rm -rf "$CERT_TMPDIR" /tmp/usercert.pem /tmp/userkey.pem' EXIT
        echo "$PYTHON3_GFAL_SERVICE_ACCOUNT_P12" | base64 -d > "$CERT_TMPDIR/service_account.p12"
        openssl pkcs12 -in "$CERT_TMPDIR/service_account.p12" -clcerts -nokeys -passin pass: -out /tmp/usercert.pem
        openssl pkcs12 -in "$CERT_TMPDIR/service_account.p12" -nocerts -nodes -passin pass: -out /tmp/userkey.pem
        chown "$(id -u):$(id -g)" /tmp/usercert.pem /tmp/userkey.pem
        chmod 600 /tmp/usercert.pem /tmp/userkey.pem
        grid-proxy-init -cert /tmp/usercert.pem -key /tmp/userkey.pem -out /tmp/x509proxy -valid 12:00 -q
        echo "X509_USER_PROXY=/tmp/x509proxy" >> "$GITHUB_ENV"

    - name: Deploy EOS via Helm chart on k3s
      run: |
        kubectl create namespace "${EOS_NAMESPACE}"
        helm install eos oci://registry.cern.ch/eos/charts/server \
          --namespace "${EOS_NAMESPACE}" \
          --set "global.repository=${EOS_IMAGE_REPO}" \
          --set "global.tag=${EOS_IMAGE_TAG}" \
          --set "global.pullPolicy=IfNotPresent" \
          --set "fst.replicaCount=1" \
          --set "qdb.replicaCount=1" \
          --set "global.securityContext.privileged=true" \
          --set "global.securityContext.allowPrivilegeEscalation=true" \
          --timeout 20m \
          --wait

    - name: Wait for EOS namespace to boot
      run: |
        MGM_CONTAINER=$(
          kubectl get pod -n "${EOS_NAMESPACE}" eos-mgm-0 \
            -o jsonpath='{.spec.containers[0].name}'
        )
        for i in $(seq 1 60); do
          if kubectl exec -n "${EOS_NAMESPACE}" eos-mgm-0 -c "${MGM_CONTAINER}" -- \
               eos ns stat 2>/dev/null | grep -q "booted"; then
            break
          fi
          if [ "$i" -eq 60 ]; then
            kubectl logs -n "${EOS_NAMESPACE}" eos-mgm-0 --all-containers=true --tail=100 || true
            exit 1
          fi
          sleep 10
        done

    - name: Run EOS deployment tests inside k3s
      run: |
        chmod +x scripts/prepare-eos-kind-deployment.sh
        export EOS_TEST_KUBECTL_NAMESPACE="${EOS_NAMESPACE}"
        export EOS_TEST_KUBECTL_TARGET=eos-mgm-0
        export EOS_TEST_KUBECTL_CONTAINER
        EOS_TEST_KUBECTL_CONTAINER=$(
          kubectl get pod -n "${EOS_NAMESPACE}" eos-mgm-0 \
            -o jsonpath='{.spec.containers[0].name}'
        )

        while IFS= read -r line; do
          case "${line}" in
            GFAL_DEPLOYMENT_NAME=*|GFAL_DEPLOYMENT_VERIFY_SSL=*|GFAL_DEPLOYMENT_SUPPORTS_LISTING=*|GFAL_DEPLOYMENT_ROOT_WRITABLE_BASE=*|GFAL_DEPLOYMENT_ROOT_DENIED_BASE=*)
              export "${line}"
              ;;
          esac
        done < <(./scripts/prepare-eos-kind-deployment.sh "gha-${GITHUB_RUN_ID}")
        kubectl delete job -n "${EOS_NAMESPACE}" gfal-eos-tests --ignore-not-found=true || true
        cat <<YAML | kubectl apply -n "${EOS_NAMESPACE}" -f -
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: gfal-eos-tests
        spec:
          backoffLimit: 0
          template:
            spec:
              restartPolicy: Never
              containers:
              - name: tests
                image: condaforge/miniforge3:latest
                command: ["bash", "-lc"]
                args:
                - |
                  set -euo pipefail
                  conda install -y -n base -c conda-forge python=3.11 xrootd
                  cp -a /src/. /app
                  python -m pip install --upgrade pip
                  pip install --no-cache-dir '/app[dev]'
                  export PYTHONDONTWRITEBYTECODE=1
                  export PYTEST_ADDOPTS='-p no:cacheprovider'
                  export GFAL_DEPLOYMENT_NAME='${GFAL_DEPLOYMENT_NAME}'
                  export GFAL_DEPLOYMENT_VERIFY_SSL='${GFAL_DEPLOYMENT_VERIFY_SSL}'
                  export GFAL_DEPLOYMENT_SUPPORTS_LISTING='${GFAL_DEPLOYMENT_SUPPORTS_LISTING}'
                  export GFAL_DEPLOYMENT_ROOT_WRITABLE_BASE='${GFAL_DEPLOYMENT_ROOT_WRITABLE_BASE}'
                  export GFAL_DEPLOYMENT_ROOT_DENIED_BASE='${GFAL_DEPLOYMENT_ROOT_DENIED_BASE}'
                  export GFAL_DEPLOYMENT_PROXY=/proxy/x509proxy
                  export X509_USER_PROXY=/proxy/x509proxy
                  cd /app
                  pytest -v -rs -n0 \
                    tests/test_integration_storage_deployment.py::test_deployment_contract_has_a_remote_endpoint \
                    tests/test_integration_storage_deployment.py::test_xrootd_copy_roundtrip[local-root] \
                    tests/test_integration_storage_deployment.py::test_xrootd_copy_roundtrip[root-local] \
                    tests/test_integration_storage_deployment.py::test_remote_listing_sees_uploaded_file[root] \
                    tests/test_integration_storage_deployment.py::test_permission_denied_paths_reject_writes[root]
                volumeMounts:
                - name: app
                  mountPath: /app
                - name: app-src
                  mountPath: /src
                  readOnly: true
                - name: proxydir
                  mountPath: /proxy
                  readOnly: true
              volumes:
              - name: app
                emptyDir: {}
              - name: app-src
                hostPath:
                  path: ${GFAL_HOST_WORKSPACE}
                  type: Directory
              - name: proxydir
                hostPath:
                  path: /tmp
                  type: Directory
        YAML
        for _ in $(seq 1 180); do
          SUCCEEDED=$(kubectl get job -n "${EOS_NAMESPACE}" gfal-eos-tests -o jsonpath='{.status.succeeded}' 2>/dev/null || echo 0)
          FAILED=$(kubectl get job -n "${EOS_NAMESPACE}" gfal-eos-tests -o jsonpath='{.status.failed}' 2>/dev/null || echo 0)
          if [ "${SUCCEEDED:-0}" -ge 1 ]; then
            break
          fi
          if [ "${FAILED:-0}" -ge 1 ]; then
            kubectl logs -n "${EOS_NAMESPACE}" job/gfal-eos-tests --all-containers=true --tail=-1 || true
            kubectl describe job -n "${EOS_NAMESPACE}" gfal-eos-tests || true
            kubectl describe pod -n "${EOS_NAMESPACE}" -l job-name=gfal-eos-tests || true
            exit 1
          fi
          sleep 10
        done
        if [ "$(kubectl get job -n "${EOS_NAMESPACE}" gfal-eos-tests -o jsonpath='{.status.succeeded}' 2>/dev/null || echo 0)" -lt 1 ]; then
          kubectl logs -n "${EOS_NAMESPACE}" job/gfal-eos-tests --all-containers=true --tail=-1 || true
          kubectl describe job -n "${EOS_NAMESPACE}" gfal-eos-tests || true
          kubectl describe pod -n "${EOS_NAMESPACE}" -l job-name=gfal-eos-tests || true
          exit 1
        fi
        kubectl logs -n "${EOS_NAMESPACE}" job/gfal-eos-tests --all-containers=true --tail=-1

    - name: Dump EOS state on failure
      if: failure()
      run: |
        kubectl get pods -n "${EOS_NAMESPACE}" || true
        kubectl get svc -n "${EOS_NAMESPACE}" || true
        kubectl logs -n "${EOS_NAMESPACE}" eos-mgm-0 --all-containers=true --tail=100 || true
        kubectl logs -n "${EOS_NAMESPACE}" eos-fst-0 --all-containers=true --tail=100 || true

    - name: Cleanup EOS namespace
      if: always()
      run: kubectl delete namespace "${EOS_NAMESPACE}" --ignore-not-found=true --wait=false || true

  deployment-integration-dcache:
    name: Deployment Integration (dCache k3s)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, Linux, X64, gfal-k3s]
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      DCACHE_NAMESPACE: dcache-${{ github.run_id }}
    steps:
    - name: Repair self-hosted workspace permissions
      run: |
        sudo mkdir -p "${GITHUB_WORKSPACE}"
        sudo chown -R "$(id -u):$(id -g)" "${GITHUB_WORKSPACE}" || true
        sudo chmod -R u+rwX "${GITHUB_WORKSPACE}" || true
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install local test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir ".[dev]"

    - name: Add Helm repositories
      run: |
        helm repo add bitnami https://charts.bitnami.com/bitnami
        helm repo add dcache https://gitlab.desy.de/api/v4/projects/7648/packages/helm/test
        helm repo update

    - name: Deploy dCache on k3s
      run: |
        rm -rf /tmp/dcache-chart
        mkdir -p /tmp/dcache-chart
        helm pull dcache/dcache --untar --untardir /tmp/dcache-chart
        python - <<'PY'
        from pathlib import Path

        template = Path("/tmp/dcache-chart/dcache/templates/configmap.yaml")
        old = """{{ if .Values.services.webdavs.enabled }}
            [door-svc/webdav]
            webdav.cell.name=webdav-tls
            webdav.net.port=8083
            webdav.authn.protocol=https
            webdav.authz.anonymous-operations=READONLY
            webdav.redirect.on-write=false
            webdav.redirect.on-read=true
        {{- end }}"""
        new = """{{ if .Values.services.webdavs.enabled }}
            [door-svc/webdav]
            webdav.cell.name=webdav-tls
            webdav.net.port=8083
            webdav.authn.protocol=https
            webdav.authz.anonymous-operations=FULL
            webdav.redirect.on-write=false
            webdav.redirect.on-read=false
        {{- end }}"""
        content = template.read_text()
        if old not in content:
            raise SystemExit("expected dCache webdavs stanza not found")
        template.write_text(content.replace(old, new, 1))
        PY

        kubectl create namespace "${DCACHE_NAMESPACE}"
        helm install --wait -n "${DCACHE_NAMESPACE}" \
          --set auth.username=dcache \
          --set auth.password=let-me-in \
          --set auth.database=chimera \
          chimera bitnami/postgresql
        helm install --wait -n "${DCACHE_NAMESPACE}" \
          --set global.security.allowInsecureImages=true \
          --set image.repository=bitnamilegacy/zookeeper \
          cells bitnami/zookeeper
        helm install --wait -n "${DCACHE_NAMESPACE}" \
          --set global.security.allowInsecureImages=true \
          --set externalZookeeper.servers=cells-zookeeper \
          --set kraft.enabled=false \
          --set image.repository=bitnamilegacy/kafka \
          billing bitnami/kafka \
          --version 23.0.7
        helm install --wait -n "${DCACHE_NAMESPACE}" -f ci/dcache-values.yaml store /tmp/dcache-chart/dcache

    - name: Wait for dCache WebDAV door to accept connections
      run: |
        kubectl rollout status -n "${DCACHE_NAMESPACE}" statefulset/store-dcache-door --timeout=10m
        kubectl wait -n "${DCACHE_NAMESPACE}" --for=condition=Ready pod/store-dcache-door-0 --timeout=10m

    - name: Run dCache deployment tests inside k3s
      run: |
        chmod +x scripts/prepare-dcache-kind-deployment.sh
        while IFS= read -r line; do
          export "${line}"
        done < <(./scripts/prepare-dcache-kind-deployment.sh "gha-${GITHUB_RUN_ID}" store "${DCACHE_NAMESPACE}")
        kubectl delete job -n "${DCACHE_NAMESPACE}" gfal-dcache-tests --ignore-not-found=true || true
        cat <<YAML | kubectl apply -n "${DCACHE_NAMESPACE}" -f -
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: gfal-dcache-tests
        spec:
          backoffLimit: 0
          template:
            spec:
              restartPolicy: Never
              containers:
              - name: tests
                image: condaforge/miniforge3:latest
                command: ["bash", "-lc"]
                args:
                - |
                  set -euo pipefail
                  conda install -y -n base -c conda-forge python=3.11 xrootd
                  cp -a /src/. /app
                  python -m pip install --upgrade pip
                  pip install --no-cache-dir '/app[dev]'
                  export PYTHONDONTWRITEBYTECODE=1
                  export PYTEST_ADDOPTS='-p no:cacheprovider'
                  export GFAL_DEPLOYMENT_NAME='${GFAL_DEPLOYMENT_NAME}'
                  export GFAL_DEPLOYMENT_VERIFY_SSL='${GFAL_DEPLOYMENT_VERIFY_SSL}'
                  export GFAL_DEPLOYMENT_SUPPORTS_LISTING='${GFAL_DEPLOYMENT_SUPPORTS_LISTING}'
                  export GFAL_DEPLOYMENT_HTTP_WRITABLE_BASE='${GFAL_DEPLOYMENT_HTTP_WRITABLE_BASE}'
                  export GFAL_DEPLOYMENT_HTTP_DENIED_BASE='${GFAL_DEPLOYMENT_HTTP_DENIED_BASE}'
                  export GFAL_DEPLOYMENT_HTTP_DENIED_MARKERS='Permission denied,403,access denied,Authentication required,401'
                  export GFAL_DEPLOYMENT_ROOT_WRITABLE_BASE='${GFAL_DEPLOYMENT_ROOT_WRITABLE_BASE}'
                  export GFAL_DEPLOYMENT_ROOT_DENIED_BASE='${GFAL_DEPLOYMENT_ROOT_DENIED_BASE}'
                  cd /app
                  pytest -v -rs -n0 \
                    tests/test_integration_storage_deployment.py::test_deployment_contract_has_a_remote_endpoint \
                    tests/test_integration_storage_deployment.py::test_http_copy_roundtrip[local-http] \
                    tests/test_integration_storage_deployment.py::test_http_copy_roundtrip[http-local] \
                    tests/test_integration_storage_deployment.py::test_xrootd_copy_roundtrip[local-root] \
                    tests/test_integration_storage_deployment.py::test_xrootd_copy_roundtrip[root-local] \
                    tests/test_integration_storage_deployment.py::test_http_root_bridge_copy[http-root] \
                    tests/test_integration_storage_deployment.py::test_http_root_bridge_copy[root-http] \
                    tests/test_integration_storage_deployment.py::test_remote_listing_sees_uploaded_file[http] \
                    tests/test_integration_storage_deployment.py::test_remote_listing_sees_uploaded_file[root] \
                    tests/test_integration_storage_deployment.py::test_permission_denied_paths_reject_writes[http] \
                    tests/test_integration_storage_deployment.py::test_permission_denied_paths_reject_writes[root]
                volumeMounts:
                - name: app
                  mountPath: /app
                - name: app-src
                  mountPath: /src
                  readOnly: true
              volumes:
              - name: app
                emptyDir: {}
              - name: app-src
                hostPath:
                  path: ${GITHUB_WORKSPACE}
                  type: Directory
        YAML
        for _ in $(seq 1 180); do
          SUCCEEDED=$(kubectl get job -n "${DCACHE_NAMESPACE}" gfal-dcache-tests -o jsonpath='{.status.succeeded}' 2>/dev/null || echo 0)
          FAILED=$(kubectl get job -n "${DCACHE_NAMESPACE}" gfal-dcache-tests -o jsonpath='{.status.failed}' 2>/dev/null || echo 0)
          if [ "${SUCCEEDED:-0}" -ge 1 ]; then
            break
          fi
          if [ "${FAILED:-0}" -ge 1 ]; then
            kubectl logs -n "${DCACHE_NAMESPACE}" job/gfal-dcache-tests --all-containers=true --tail=-1 || true
            kubectl describe job -n "${DCACHE_NAMESPACE}" gfal-dcache-tests || true
            kubectl describe pod -n "${DCACHE_NAMESPACE}" -l job-name=gfal-dcache-tests || true
            exit 1
          fi
          sleep 10
        done
        if [ "$(kubectl get job -n "${DCACHE_NAMESPACE}" gfal-dcache-tests -o jsonpath='{.status.succeeded}' 2>/dev/null || echo 0)" -lt 1 ]; then
          kubectl logs -n "${DCACHE_NAMESPACE}" job/gfal-dcache-tests --all-containers=true --tail=-1 || true
          kubectl describe job -n "${DCACHE_NAMESPACE}" gfal-dcache-tests || true
          kubectl describe pod -n "${DCACHE_NAMESPACE}" -l job-name=gfal-dcache-tests || true
          exit 1
        fi
        kubectl logs -n "${DCACHE_NAMESPACE}" job/gfal-dcache-tests --all-containers=true --tail=-1

    - name: Dump dCache state on failure
      if: failure()
      run: |
        kubectl get pods -n "${DCACHE_NAMESPACE}" || true
        kubectl get svc -n "${DCACHE_NAMESPACE}" || true
        kubectl logs -n "${DCACHE_NAMESPACE}" statefulset/store-dcache-door --all-containers=true --tail=100 || true
        kubectl logs -n "${DCACHE_NAMESPACE}" statefulset/store-pool-a --all-containers=true --tail=100 || true

    - name: Cleanup dCache namespace
      if: always()
      run: kubectl delete namespace "${DCACHE_NAMESPACE}" --ignore-not-found=true --wait=false || true

  deployment-integration-storm:
    name: Deployment Integration (StoRM k3s)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, Linux, X64, gfal-k3s]
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      STORM_NAMESPACE: storm-${{ github.run_id }}
    steps:
    - name: Repair self-hosted workspace permissions
      run: |
        sudo mkdir -p "${GITHUB_WORKSPACE}"
        sudo chown -R "$(id -u):$(id -g)" "${GITHUB_WORKSPACE}" || true
        sudo chmod -R u+rwX "${GITHUB_WORKSPACE}" || true
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install local test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir ".[dev]"

    - name: Clone StoRM WebDAV deployment chart
      run: |
        STORM_CHART_DIR=$(mktemp -d /tmp/storm-webdav-deployment.XXXXXX)
        echo "STORM_CHART_DIR=${STORM_CHART_DIR}" >> "$GITHUB_ENV"
        git clone --depth=1 https://gitlab.com/ska-telescope/src/src-dm/ska-src-dm-storm-webdav-deployment.git "${STORM_CHART_DIR}"

    - name: Patch StoRM chart for CI authz config
      run: |
        python - <<'PY'
        import os
        from pathlib import Path

        path = Path(os.environ["STORM_CHART_DIR"]) / "etc/helm/templates/application-secret.yaml"
        text = path.read_text()
        snippet = (
            "{{- with .Values.config.application.extraConfig }}\n"
            "{{ . | nindent 4 }}\n"
            "{{- end }}\n"
        )
        if snippet not in text:
          path.write_text(text.rstrip() + "\n" + snippet)
        PY

    - name: Create StoRM TLS secret
      run: |
        kubectl create namespace "${STORM_NAMESPACE}"
        openssl req -x509 -nodes -newkey rsa:2048 -days 2 \
          -subj "/CN=storm-webdav.${STORM_NAMESPACE}.svc.cluster.local" \
          -addext "subjectAltName=DNS:storm-webdav.${STORM_NAMESPACE}.svc.cluster.local,DNS:storm-webdav,DNS:localhost" \
          -keyout /tmp/storm-tls.key \
          -out /tmp/storm-tls.crt
        kubectl create secret tls storm-tls-secret \
          --namespace "${STORM_NAMESPACE}" \
          --cert=/tmp/storm-tls.crt \
          --key=/tmp/storm-tls.key

    - name: Deploy StoRM WebDAV via Helm chart on k3s
      run: |
        helm install storm "${STORM_CHART_DIR}/etc/helm" \
          --namespace "${STORM_NAMESPACE}" \
          --values ci/storm-values.yaml \
          --set-string "extraEnv.STORM_WEBDAV_HOSTNAME_0=storm-webdav.${STORM_NAMESPACE}.svc.cluster.local" \
          --debug \
          --timeout 5m \
          --wait

    - name: Run StoRM deployment tests inside k3s
      run: |
        chmod +x scripts/prepare-storm-kind-deployment.sh
        while IFS= read -r line; do
          export "${line}"
        done < <(./scripts/prepare-storm-kind-deployment.sh "gha-${GITHUB_RUN_ID}" "${STORM_NAMESPACE}")
        kubectl delete job -n "${STORM_NAMESPACE}" gfal-storm-tests --ignore-not-found=true || true
        cat <<YAML | kubectl apply -n "${STORM_NAMESPACE}" -f -
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: gfal-storm-tests
        spec:
          backoffLimit: 0
          template:
            spec:
              restartPolicy: Never
              containers:
              - name: tests
                image: python:3.12-slim
                command: ["bash", "-lc"]
                args:
                - |
                  set -euo pipefail
                  export DEBIAN_FRONTEND=noninteractive
                  apt-get update
                  apt-get install -y --no-install-recommends build-essential ca-certificates cmake git libkrb5-dev libssl-dev pkg-config uuid-dev zlib1g-dev
                  cp -a /src/. /app
                  python -m pip install --upgrade pip
                  pip install --no-cache-dir '/app[dev]'
                  export PYTHONDONTWRITEBYTECODE=1
                  export PYTEST_ADDOPTS='-p no:cacheprovider'
                  export GFAL_DEPLOYMENT_NAME='${GFAL_DEPLOYMENT_NAME}'
                  export GFAL_DEPLOYMENT_VERIFY_SSL='${GFAL_DEPLOYMENT_VERIFY_SSL}'
                  export GFAL_DEPLOYMENT_SUPPORTS_LISTING='${GFAL_DEPLOYMENT_SUPPORTS_LISTING}'
                  export GFAL_DEPLOYMENT_HTTP_WRITABLE_BASE='${GFAL_DEPLOYMENT_HTTP_WRITABLE_BASE}'
                  export GFAL_DEPLOYMENT_HTTP_DENIED_BASE='${GFAL_DEPLOYMENT_HTTP_DENIED_BASE}'
                  export GFAL_DEPLOYMENT_HTTP_DENIED_MARKERS='Permission denied,403,access denied,Authentication required,401'
                  cd /app
                  pytest -v -rs -n0 \
                    tests/test_integration_storage_deployment.py::test_deployment_contract_has_a_remote_endpoint \
                    tests/test_integration_storage_deployment.py::test_http_copy_roundtrip[local-http] \
                    tests/test_integration_storage_deployment.py::test_http_copy_roundtrip[http-local] \
                    tests/test_integration_storage_deployment.py::test_remote_listing_sees_uploaded_file[http] \
                    tests/test_integration_storage_deployment.py::test_permission_denied_paths_reject_writes[http]
                volumeMounts:
                - name: app
                  mountPath: /app
                - name: app-src
                  mountPath: /src
                  readOnly: true
              volumes:
              - name: app
                emptyDir: {}
              - name: app-src
                hostPath:
                  path: ${GITHUB_WORKSPACE}
                  type: Directory
        YAML
        for _ in $(seq 1 180); do
          SUCCEEDED=$(kubectl get job -n "${STORM_NAMESPACE}" gfal-storm-tests -o jsonpath='{.status.succeeded}' 2>/dev/null || echo 0)
          FAILED=$(kubectl get job -n "${STORM_NAMESPACE}" gfal-storm-tests -o jsonpath='{.status.failed}' 2>/dev/null || echo 0)
          if [ "${SUCCEEDED:-0}" -ge 1 ]; then
            break
          fi
          if [ "${FAILED:-0}" -ge 1 ]; then
            kubectl logs -n "${STORM_NAMESPACE}" job/gfal-storm-tests --all-containers=true --tail=-1 || true
            kubectl describe job -n "${STORM_NAMESPACE}" gfal-storm-tests || true
            kubectl describe pod -n "${STORM_NAMESPACE}" -l job-name=gfal-storm-tests || true
            exit 1
          fi
          sleep 10
        done
        if [ "$(kubectl get job -n "${STORM_NAMESPACE}" gfal-storm-tests -o jsonpath='{.status.succeeded}' 2>/dev/null || echo 0)" -lt 1 ]; then
          kubectl logs -n "${STORM_NAMESPACE}" job/gfal-storm-tests --all-containers=true --tail=-1 || true
          kubectl describe job -n "${STORM_NAMESPACE}" gfal-storm-tests || true
          kubectl describe pod -n "${STORM_NAMESPACE}" -l job-name=gfal-storm-tests || true
          exit 1
        fi
        kubectl logs -n "${STORM_NAMESPACE}" job/gfal-storm-tests --all-containers=true --tail=-1

    - name: Dump StoRM state on failure
      if: failure()
      run: |
        kubectl get pods -n "${STORM_NAMESPACE}" || true
        kubectl get svc -n "${STORM_NAMESPACE}" || true
        kubectl get events -n "${STORM_NAMESPACE}" --sort-by=.metadata.creationTimestamp | tail -n 50 || true
        kubectl describe pod -n "${STORM_NAMESPACE}" -l app=storm-webdav || true
        POD=$(kubectl get pod -n "${STORM_NAMESPACE}" -l app=storm-webdav -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
        if [ -n "${POD}" ]; then
          kubectl logs -n "${STORM_NAMESPACE}" "${POD}" -c storm-webdav --tail=200 || true
          kubectl logs -n "${STORM_NAMESPACE}" "${POD}" -c storm-webdav --previous --tail=200 || true
          kubectl logs -n "${STORM_NAMESPACE}" "${POD}" -c prepare-ca-certificates --tail=200 || true
          kubectl logs -n "${STORM_NAMESPACE}" "${POD}" -c change-ownership-of-sa-to-storm-user --tail=200 || true
        fi

    - name: Cleanup StoRM namespace
      if: always()
      run: |
        kubectl delete namespace "${STORM_NAMESPACE}" --ignore-not-found=true --wait=false || true
        if [ -n "${STORM_CHART_DIR:-}" ]; then
          rm -rf "${STORM_CHART_DIR}"
        fi

  # ---------------------------------------------------------------------------
  # 2. Packaging
  # ---------------------------------------------------------------------------

  build:
    name: Build distribution 📦
    needs: [ codespell, pre-commit, tests, xrootd, integration ]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: "3.x"
        cache: 'pip'
        cache-dependency-path: pyproject.toml
    - name: Install build dependencies
      run: python -m pip install build hatchling hatch-vcs
    - name: Build sdist and wheel
      run: python -m build
    - name: Store distributions
      uses: actions/upload-artifact@v7
      with:
        name: python-package-distributions
        path: dist/

  build-rpm:
    name: Build RPM 📦 (${{ matrix.os.name }}) [${{ matrix.arch }}]
    needs: [ build ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os:
        - image: almalinux:9
          name: el9
        - image: almalinux:10
          name: el10
        arch: [ x86_64, aarch64 ]
    steps:
    - name: Set up QEMU
      if: matrix.arch == 'aarch64'
      uses: docker/setup-qemu-action@v4
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Build RPM in Container
      run: |
        docker run --rm \
          --platform linux/${{ matrix.arch == 'x86_64' && 'amd64' || 'arm64' }} \
          -v ${{ github.workspace }}:/workspace -w /workspace \
          ${{ matrix.os.image }} \
          bash -c "dnf install -y git rpm-build make python3-devel python3-pip && \
                   git config --global --add safe.directory '*' && \
                   python3 -m pip install build hatchling hatch-vcs click 'rich>=13.0.0' 'rich-click>=1.7.0' 'fsspec>=2023.1.0' && \
                   make rpm"
    - name: Store RPMs
      uses: actions/upload-artifact@v7
      with:
        name: rpm-package-distributions-${{ matrix.os.name }}-${{ matrix.arch }}
        path: rpmbuild/RPMS/*/*.rpm

  build-conda:
    name: Build Conda Package 📦
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Cache conda packages
      uses: actions/cache@v5
      with:
        path: ${{ runner.temp }}/conda_pkgs_dir
        key: ${{ runner.os }}-conda-pkgs-v1-${{ hashFiles('pyproject.toml', 'recipe/meta.yaml', '.github/workflows/ci.yml') }}
    - uses: conda-incubator/setup-miniconda@v4
      with:
        activate-environment: conda-build
        auto-activate-base: false
        channels: conda-forge
        channel-priority: strict
        miniforge-variant: Miniforge3
        python-version: "3.11"
        pkgs-dirs: ${{ runner.temp }}/conda_pkgs_dir
    - name: Install conda build dependencies
      shell: bash -el {0}
      run: conda install -y conda-build anaconda-client hatchling hatch-vcs
    - name: Build conda package
      shell: bash -el {0}
      run: |
        export PKG_VERSION="$(python -m hatchling version)"
        export SETUPTOOLS_SCM_PRETEND_VERSION="$PKG_VERSION"
        conda build --override-channels -c conda-forge recipe --output-folder conda-dist
    - name: Store conda package
      uses: actions/upload-artifact@v7
      with:
        name: conda-package-distributions
        path: conda-dist/noarch/*

  # ---------------------------------------------------------------------------
  # 3. Validation & Repository Update
  # ---------------------------------------------------------------------------

  test-install:
    name: Test Install 🧪 (${{ matrix.target.name }})
    needs: [ build-rpm ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
        - name: AlmaLinux 9
          container: almalinux:9
          artifact: rpm-package-distributions-el9-x86_64
          install_cmd: |
            dnf install -y epel-release dnf-plugins-core
            dnf config-manager --set-enabled crb
            find . -name "*.rpm" -exec dnf install -y {} +
        - name: AlmaLinux 10
          container: almalinux:10
          artifact: rpm-package-distributions-el10-x86_64
          install_cmd: |
            dnf install -y epel-release
            find . -name "*.rpm" -exec dnf install -y {} +
    container: ${{ matrix.target.container }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/download-artifact@v8
      with:
        name: ${{ matrix.target.artifact }}
        path: rpms/
    - name: Install package
      run: |
        cd rpms
        ${{ matrix.target.install_cmd }}
    - name: Verify executables
      run: |
        command -v gfal
        gfal --help
    - name: Verify shell completion files
      run: |
        rpm -q bash-completion
        test -f /usr/share/bash-completion/completions/gfal
        test -f /usr/share/zsh/site-functions/_gfal
        grep -q '_gfal_completion' /usr/share/bash-completion/completions/gfal
        grep -q '_gfal_completion' /usr/share/zsh/site-functions/_gfal
        bash -lc 'source /usr/share/bash-completion/bash_completion; _completion_loader gfal >/dev/null 2>&1 || [ "$?" -eq 124 ]; complete -p gfal | grep -q _gfal_completion'
    - name: Install pip and test dependencies
      run: |
        python3 -m ensurepip --upgrade || dnf install -y python3-pip
        python3 -m pip install --no-cache-dir pytest pytest-asyncio pytest-xdist pytest-cov pytest-rerunfailures
    - name: Run tests against installed package
      run: python3 -m pytest tests/ -q -m "not integration and not xrootd and not mount" --override-ini="addopts="

  test-conda-install:
    name: Test Conda Install 🧪
    needs: [ build-conda ]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/download-artifact@v8
      with:
        name: conda-package-distributions
        path: conda-dist/noarch/
    - name: Cache conda packages
      uses: actions/cache@v5
      with:
        path: ${{ runner.temp }}/conda_pkgs_dir
        key: ${{ runner.os }}-conda-pkgs-v1-${{ hashFiles('pyproject.toml', 'recipe/meta.yaml', '.github/workflows/ci.yml') }}
    - uses: conda-incubator/setup-miniconda@v4
      with:
        activate-environment: conda-test
        auto-activate-base: false
        channels: conda-forge
        channel-priority: strict
        miniforge-variant: Miniforge3
        python-version: "3.11"
        pkgs-dirs: ${{ runner.temp }}/conda_pkgs_dir
    - name: Index local conda channel
      shell: bash -el {0}
      run: |
        conda install -y conda-build conda-index
        python -m conda_index conda-dist
    - name: Install local conda package
      shell: bash -el {0}
      run: conda install -y -c "file://${GITHUB_WORKSPACE}/conda-dist" -c conda-forge gfal
    - name: Verify XRootD-enabled install
      shell: bash -el {0}
      run: |
        command -v gfal
        python -c "import aiohttp, click, fsspec, rich, rich_click, urllib3; print(fsspec.__version__)"
        gfal --help
        python -c "from XRootD import client; import gfal; import rich_click"

  update-repo:
    name: Update YUM Repository 🌐
    needs: [ build-rpm, test-install ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/download-artifact@v8
      with:
        name: rpm-package-distributions-el9-x86_64
        path: artifacts/el9-x86_64/
    - uses: actions/download-artifact@v8
      with:
        name: rpm-package-distributions-el9-aarch64
        path: artifacts/el9-aarch64/
    - uses: actions/download-artifact@v8
      with:
        name: rpm-package-distributions-el10-x86_64
        path: artifacts/el10-x86_64/
    - uses: actions/download-artifact@v8
      with:
        name: rpm-package-distributions-el10-aarch64
        path: artifacts/el10-aarch64/
    - name: Install tools
      run: |
        sudo apt-get update && sudo apt-get install -y createrepo-c rpm
        pip install mkdocs-material
    - name: Build Docs 📚
      run: mkdocs build
    - name: Prepare Repository
      run: |
        mkdir -p site/rpm/el9/x86_64 site/rpm/el9/aarch64 site/rpm/el10/x86_64 site/rpm/el10/aarch64

        # Publish a single canonical noarch RPM from the x86_64 build into
        # both architecture-specific repos. Uploading all build artifacts into
        # one flat directory can produce duplicate noarch filenames where the
        # last copy wins nondeterministically.
        find artifacts/el9-x86_64/ -name "*noarch.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el9/x86_64/ \;
        find artifacts/el9-x86_64/ -name "*noarch.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el9/aarch64/ \;
        find artifacts/el10-x86_64/ -name "*noarch.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el10/x86_64/ \;
        find artifacts/el10-x86_64/ -name "*noarch.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el10/aarch64/ \;

        find artifacts/el9-x86_64/ -name "*x86_64.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el9/x86_64/ \;
        find artifacts/el9-aarch64/ -name "*aarch64.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el9/aarch64/ \;
        find artifacts/el10-x86_64/ -name "*x86_64.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el10/x86_64/ \;
        find artifacts/el10-aarch64/ -name "*aarch64.rpm" ! -name "*.src.rpm" -exec cp {} site/rpm/el10/aarch64/ \;

        for rpm_file in site/rpm/el*/*/*.rpm; do
          rpm -Kv "$rpm_file"
        done

        for d in site/rpm/el*/*/; do
          test -n "$(find "$d" -maxdepth 1 -name '*.rpm' -print -quit)" || {
            echo "No RPMs copied into $d"
            exit 1
          }
        done
        for d in site/rpm/el*/*/; do createrepo_c "$d"; done

        cat <<EOF > site/rpm/gfal.repo
        [gfal]
        name=gfal repository
        baseurl=https://lobis.github.io/gfal/rpm/el\$releasever/\$basearch/
        enabled=1
        gpgcheck=0
        EOF
    - uses: actions/upload-pages-artifact@v5
      with:
        path: ./site/
    - uses: actions/deploy-pages@v5
      id: deployment

  publish-to-pypi:
    name: Publish to PyPI 🚀
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ build, build-rpm, build-conda, test-install, test-conda-install ]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gfal
    permissions:
      id-token: write
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: python-package-distributions
        path: dist/
    - uses: pypa/gh-action-pypi-publish@release/v1

  publish-conda:
    name: Publish Conda Package 🚀
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ build-conda, test-conda-install ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: conda-package-distributions
        path: conda-dist/noarch/
    - name: Cache conda packages
      uses: actions/cache@v5
      with:
        path: ${{ runner.temp }}/conda_pkgs_dir
        key: ${{ runner.os }}-conda-pkgs-v1-${{ hashFiles('pyproject.toml', 'recipe/meta.yaml', '.github/workflows/ci.yml') }}
    - uses: conda-incubator/setup-miniconda@v4
      with:
        activate-environment: conda-publish
        auto-activate-base: false
        channels: conda-forge
        channel-priority: strict
        miniforge-variant: Miniforge3
        python-version: "3.12"
        pkgs-dirs: ${{ runner.temp }}/conda_pkgs_dir
    - name: Install upload client
      if: env.ANACONDA_API_TOKEN != ''
      shell: bash -el {0}
      run: conda install -y anaconda-client
    - name: Upload to Anaconda.org
      if: env.ANACONDA_API_TOKEN != ''
      shell: bash -el {0}
      run: anaconda --token "$ANACONDA_API_TOKEN" upload --user lobis conda-dist/noarch/gfal-*.conda
    - name: Skip upload when token is unavailable
      if: env.ANACONDA_API_TOKEN == ''
      run: echo "ANACONDA_API_TOKEN is not configured; skipping conda upload."

  github-release:
    name: Create GitHub Release 🚀
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ build, build-rpm, build-conda, test-install, test-conda-install ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: python-package-distributions
        path: release-artifacts/python/
    - uses: actions/download-artifact@v8
      with:
        name: rpm-package-distributions-el9-x86_64
        path: release-artifacts/rpm/el9-x86_64/
    - uses: actions/download-artifact@v8
      with:
        name: rpm-package-distributions-el9-aarch64
        path: release-artifacts/rpm/el9-aarch64/
    - uses: actions/download-artifact@v8
      with:
        name: rpm-package-distributions-el10-x86_64
        path: release-artifacts/rpm/el10-x86_64/
    - uses: actions/download-artifact@v8
      with:
        name: rpm-package-distributions-el10-aarch64
        path: release-artifacts/rpm/el10-aarch64/
    - uses: actions/download-artifact@v8
      with:
        name: conda-package-distributions
        path: release-artifacts/conda/noarch/
    - name: Prepare Release Files
      run: |
        mkdir -p release-upload

        cp -a release-artifacts/python/. release-upload/
        find release-artifacts/conda/noarch/ -name "*.conda" -exec cp {} release-upload/ \;

        # As with the Pages repo, publish a single canonical noarch RPM from
        # the x86_64 build for each EL release to avoid duplicate filenames
        # from different build artifacts overwriting each other.
        find release-artifacts/rpm/el9-x86_64/ -name "*noarch.rpm" ! -name "*.src.rpm" -exec cp {} release-upload/ \;
        find release-artifacts/rpm/el10-x86_64/ -name "*noarch.rpm" ! -name "*.src.rpm" -exec cp {} release-upload/ \;

        find release-artifacts/rpm/el9-x86_64/ -name "*x86_64.rpm" ! -name "*.src.rpm" -exec cp {} release-upload/ \;
        find release-artifacts/rpm/el9-aarch64/ -name "*aarch64.rpm" ! -name "*.src.rpm" -exec cp {} release-upload/ \;
        find release-artifacts/rpm/el10-x86_64/ -name "*x86_64.rpm" ! -name "*.src.rpm" -exec cp {} release-upload/ \;
        find release-artifacts/rpm/el10-aarch64/ -name "*aarch64.rpm" ! -name "*.src.rpm" -exec cp {} release-upload/ \;

        find release-artifacts/rpm/ -name "*.src.rpm" -exec cp {} release-upload/ \;
    - uses: softprops/action-gh-release@v3
      with:
        files: release-upload/**/*
        generate_release_notes: true

  verify-deployment:
    name: Verify Deployment 🔍 (${{ matrix.target.name }})
    needs: [ update-repo, publish-to-pypi, publish-conda, github-release ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        target:
        - name: AlmaLinux 9
          container: almalinux:9
          install_cmd: |
            dnf install -y --allowerasing epel-release curl dnf-plugins-core
            dnf config-manager --set-enabled crb
            curl -fsSL -o /etc/yum.repos.d/gfal.repo https://lobis.github.io/gfal/rpm/gfal.repo
            for i in {1..18}; do \
              dnf clean all && \
              dnf makecache && \
              dnf repoquery --available python3-gfal && \
              dnf install -y --allowerasing python3-gfal && break || sleep 10; \
            done
            rpm -q python3-gfal
        - name: AlmaLinux 10
          container: almalinux:10
          install_cmd: |
            dnf install -y --allowerasing epel-release curl dnf-plugins-core
            # crb is enabled by default in AlmaLinux 10, but dnf-plugins-core is still good practice
            curl -fsSL -o /etc/yum.repos.d/gfal.repo https://lobis.github.io/gfal/rpm/gfal.repo
            for i in {1..18}; do \
              dnf clean all && \
              dnf makecache && \
              dnf repoquery --available python3-gfal && \
              dnf install -y --allowerasing python3-gfal && break || sleep 10; \
            done
            rpm -q python3-gfal
        - name: PyPI
          container: python:3.12-slim
          install_cmd: |
            i=1
            while [ "$i" -le 18 ]; do
              if pip install --no-cache-dir "gfal==$EXPECTED_VERSION"; then
                break
              fi
              if [ "$i" -eq 18 ]; then
                echo "❌ Timed out waiting for gfal==$EXPECTED_VERSION to appear on PyPI"
                exit 1
              fi
              sleep 10
              i=$((i + 1))
            done
        - name: Conda
          container: condaforge/miniforge3:latest
          install_cmd: |
            i=1
            while [ "$i" -le 18 ]; do
              if conda install -y -c lobis -c conda-forge "gfal==$EXPECTED_VERSION"; then
                break
              fi
              if [ "$i" -eq 18 ]; then
                echo "❌ Timed out waiting for gfal==$EXPECTED_VERSION to appear on Anaconda.org"
                exit 1
              fi
              sleep 10
              i=$((i + 1))
            done
    container: ${{ matrix.target.container }}
    steps:
    - name: Skip Conda verification when upload is unavailable
      if: matrix.target.name == 'Conda' && env.ANACONDA_API_TOKEN == ''
      run: echo "ANACONDA_API_TOKEN is not configured; skipping Conda verification."
    - name: Install and Verify
      if: matrix.target.name != 'Conda' || env.ANACONDA_API_TOKEN != ''
      run: |
        EXPECTED_VERSION=${{ github.ref_name }}
        EXPECTED_VERSION=${EXPECTED_VERSION#v}
        export EXPECTED_VERSION
        ${{ matrix.target.install_cmd }}
        export PATH=$PATH:/usr/local/bin
        command -v gfal || exit 1
        INSTALLED_VERSION=$(gfal --version | awk '{print $NF}')
        if [ "$INSTALLED_VERSION" != "$EXPECTED_VERSION" ]; then
          echo "❌ Version mismatch: $INSTALLED_VERSION != $EXPECTED_VERSION"
          exit 1
        fi
